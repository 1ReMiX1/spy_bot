<style>
:root {
  --bg: var(--tg-theme-bg-color, #17212b);
  --secbg: var(--tg-theme-secondary-bg-color, #232e3c);
  --text: var(--tg-theme-text-color, #ffffff);
  --hint: var(--tg-theme-hint-color, #7d8b99);
  --link: var(--tg-theme-link-color, #64baf0);
  --btn: var(--tg-theme-button-color, #3390ec);
  --btntext: var(--tg-theme-button-text-color, #ffffff);
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  font-size: 16px;
  line-height: 1.4;
  overscroll-behavior: none;
}
#app { max-width: 560px; margin: 0 auto; padding: 16px 16px 40px; min-height: 100%; }
h1 { font-size: 26px; margin: 4px 0 2px; }
h2 { font-size: 21px; margin: 8px 0 12px; }
h3 { font-size: 17px; margin: 0 0 8px; }
p { margin: 8px 0; }
.hint { color: var(--hint); font-size: 14px; }
.center { text-align: center; }
.spacer { height: 12px; }
.big { font-size: 28px; font-weight: 700; }
.huge { font-size: 34px; font-weight: 800; margin: 14px 0; }

.card {
  background: var(--secbg);
  border-radius: 16px;
  padding: 16px;
  margin: 10px 0;
}
.menu-item {
  display: flex; align-items: center; gap: 14px;
  background: var(--secbg);
  border-radius: 16px; padding: 16px; margin: 10px 0;
  cursor: pointer; border: none; width: 100%; text-align: left;
  color: var(--text); transition: transform .08s ease, opacity .08s;
}
.menu-item:active { transform: scale(0.98); opacity: .85; }
.menu-item .emoji { font-size: 32px; line-height: 1; }
.menu-item .menu-img { height: 72px; width: 72px; object-fit: contain; flex: 0 0 72px; }
.game-row { display: flex; gap: 10px; align-items: stretch; margin: 10px 0; }
.game-row .menu-item { flex: 1; margin: 0; }
.rule-btn { background: var(--secbg); border: none; border-radius: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 10px 14px; flex: 0 0 auto; transition: transform .08s ease, opacity .08s; }
.rule-btn:active { transform: scale(0.96); opacity: .85; }
.scroll-img { height: 50px; width: 50px; object-fit: contain; }
.menu-item .ttl { font-size: 18px; font-weight: 700; }
.menu-item .sub { font-size: 13px; color: var(--hint); margin-top: 2px; }

button.btn {
  display: block; width: 100%; border: none; cursor: pointer;
  background: var(--btn); color: var(--btntext);
  font-size: 17px; font-weight: 600; padding: 15px; border-radius: 14px;
  margin: 10px 0; transition: transform .08s ease, opacity .08s;
}
button.btn:active { transform: scale(0.98); opacity: .9; }
button.btn.secondary { background: var(--secbg); color: var(--text); }
button.btn.success { background: #4caf50; color: #fff; }
button.btn.danger { background: #e0533d; color: #fff; }
button.btn.warn { background: #e0a13d; color: #fff; }
button.btn:disabled { opacity: .4; cursor: default; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(64px, 1fr)); gap: 8px; }
.chip {
  border: none; cursor: pointer; background: var(--secbg); color: var(--text);
  border-radius: 12px; padding: 14px 8px; font-size: 18px; font-weight: 700;
  transition: transform .08s;
}
.chip:active { transform: scale(0.95); }
.chip.active { background: var(--btn); color: var(--btntext); }

.list-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 14px; background: var(--secbg); border-radius: 12px; margin: 6px 0;
}
.role-badge { font-size: 22px; font-weight: 800; }
.reveal-box {
  background: var(--secbg); border-radius: 20px; padding: 28px 18px; text-align: center;
  margin: 16px 0;
}
.pill { display:inline-block; padding: 4px 12px; border-radius: 999px; background: var(--btn); color: var(--btntext); font-size: 13px; font-weight: 600; }
.topbar { display:flex; align-items:center; gap:10px; margin-bottom: 6px; }
.fade { animation: fade .25s ease; }
@keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
.scorerow { display:flex; justify-content:space-between; padding:10px 4px; border-bottom:1px solid rgba(255,255,255,.08); }
.input-num { width:100%; font-size:22px; text-align:center; padding:12px; border-radius:12px; border:none; background:var(--secbg); color:var(--text); }

/* spy settings UI */
.optrow { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:14px 0; border-bottom:1px solid rgba(255,255,255,.07); }
.optrow .optmain { flex:1; min-width:0; }
.opthd { font-size:16px; font-weight:600; }
.optsub { font-size:13px; color:var(--hint); margin-top:3px; }
.grid.sm { display:flex; gap:8px; }
.grid.sm .chip { min-width:54px; }
.switch { width:52px; height:30px; border-radius:30px; background:var(--secbg); border:1px solid rgba(255,255,255,.12); position:relative; flex:0 0 auto; cursor:pointer; transition:background .2s; }
.switch.on { background:var(--btn); border-color:var(--btn); }
.switch .knob { position:absolute; top:3px; left:3px; width:22px; height:22px; border-radius:50%; background:#fff; transition:left .2s; }
.switch.on .knob { left:26px; }
.switch.disabled { opacity:.4; }
.stepper { display:flex; align-items:center; gap:12px; flex:0 0 auto; }
.stepper button { width:44px; height:44px; border-radius:12px; border:none; background:var(--secbg); color:var(--text); font-size:24px; font-weight:700; cursor:pointer; }
.stepper span { font-size:19px; font-weight:700; min-width:26px; text-align:center; }

textarea.input { width:100%; box-sizing:border-box; font-family:inherit; font-size:16px; line-height:1.4; resize:vertical; min-height:120px; }

.logo-img { height:48px; width:auto; vertical-align:middle; margin-right:10px; }

.input{width:100%;font-size:18px;padding:14px;border-radius:12px;border:none;background:var(--secbg);color:var(--text);margin:8px 0;}

#app { padding-bottom: 88px; }
#gd-nav {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 60;
  display: flex; max-width: 560px; margin: 0 auto;
  background: var(--secbg); border-top: 1px solid rgba(255,255,255,.08);
  padding: 6px 4px calc(6px + env(safe-area-inset-bottom, 0px));
}
#gd-nav button {
  flex: 1; background: none; border: none; color: var(--hint); cursor: pointer;
  padding: 6px 2px; display: flex; flex-direction: column; align-items: center; gap: 3px;
  font-size: 11px; font-weight: 600;
}
#gd-nav button .ic { font-size: 22px; line-height: 1; }
#gd-nav button.active { color: var(--btn); }
.coinbadge { display: inline-block; background: var(--secbg); border-radius: 999px; padding: 6px 12px; font-weight: 700; white-space: nowrap; }
.prof-card { background: var(--secbg); border-radius: 18px; padding: 18px; margin: 10px 0; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0; }
.stat-box { background: var(--secbg); border-radius: 14px; padding: 14px; }
.stat-box .v { font-size: 22px; font-weight: 800; }
.stat-box .k { font-size: 13px; color: var(--hint); margin-top: 2px; }
.shop-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.shop-item { background: var(--bg); border-radius: 14px; padding: 10px 6px; text-align: center; }
.shop-item .em { font-size: 30px; line-height: 1.1; }
.title-chip { display: inline-block; border-radius: 999px; padding: 3px 10px; font-weight: 700; font-size: 13px; }
.lb-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--secbg); border-radius: 12px; margin: 6px 0; }
.lb-rank { font-weight: 800; width: 28px; text-align: center; font-size: 15px; }
.lb-av { font-size: 26px; }
.lb-main { flex: 1; min-width: 0; }
.ach-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.ach { background: var(--bg); border-radius: 12px; padding: 10px 4px; text-align: center; opacity: .45; }
.ach.done { opacity: 1; }
.ach .em { font-size: 22px; }
.ach .t { font-size: 10px; color: var(--hint); margin-top: 3px; line-height: 1.2; }

</style>

}

// reusable player-count picker
function countPicker(opts) {
  // opts: {title, sub, min, max, value, onPick}
  const { title, sub, min, max } = opts;
  let val = opts.value || min;
  const chips = range(max - min + 1).map(i => {
    const n = min + i;
    return `<button class="chip" data-n="${n}">${n}</button>`;
  }).join('');
  h(`
    <div class="topbar"><span class="pill">${esc(title)}</span></div>
    <h2>Сколько игроков?</h2>
    <p class="hint">${esc(sub || '')}</p>
    <div class="grid" id="cp-grid">${chips}</div>
    <div class="spacer"></div>
    <button class="btn" id="cp-go">Продолжить</button>
    <button class="btn secondary" id="cp-back">← Назад в меню</button>
  `);
  function mark() { document.querySelectorAll('#cp-grid .chip').forEach(c => c.classList.toggle('active', +c.dataset.n === val)); }
  document.querySelectorAll('#cp-grid .chip').forEach(c => c.addEventListener('click', () => { val = +c.dataset.n; haptic(); mark(); }));
  mark();
  on('cp-go', 'click', () => { haptic(); opts.onPick(val); });
  on('cp-back', 'click', () => { haptic(); home(); });
  setBack(home);
}

// privacy gate: 'Передайте телефон X' -> reveal callback
function passDevice(toWhom, btnLabel, onReady) {
  h(`
    <div class="reveal-box">
      <div style="font-size:48px">📱➡️</div>
      <h2>Передайте устройство</h2>
      <p class="big">${esc(toWhom)}</p>
      <p class="hint">Остальные — не подглядывайте 🙈</p>
    </div>
    <button class="btn" id="pd-go">${esc(btnLabel || 'Я готов(а)')}</button>
  `);
  on('pd-go', 'click', () => { haptic('medium'); onReady(); });
}

// ======================================================
//  ШПИОН
// ======================================================
let spy = {};
function spyDefaults() { return { timer: 0, spies: 1, hint: false, noGuess: false, blind: false, voteFirst: false, rounds: 2 }; }
function spySetup() {
  countPicker({
    title: '\uD83D\uDD75\uFE0F \u0428\u041F\u0418\u041E\u041D', sub: '\u041C\u0438\u043D\u0438\u043C\u0443\u043C 3 \u0438\u0433\u0440\u043E\u043A\u0430', min: 3, max: 12, value: 4,
    onPick(n) { spy = { count: n, opt: spy.opt || spyDefaults() }; spyTheme(); }
  });
}
function spyPacks() { try { return JSON.parse(localStorage.getItem('gdag_packs') || '[]'); } catch (e) { return []; } }
function spySavePacks(a) { try { localStorage.setItem('gdag_packs', JSON.stringify(a)); } catch (e) {} }
function spyWordsFor(name) {
  if (D.THEMES[name]) return D.THEMES[name];
  const p = spyPacks().find(x => x.name === name);
  return p ? p.words : null;
}
function spyParseWords(s) {
  return (s || '').split(/[\n,;]+/).map(x => x.trim()).filter(x => x.length).filter((x, i, a) => a.indexOf(x) === i);
}
function spyTheme() {
  const builtins = Object.keys(D.THEMES);
  const packs = spyPacks();
  const allNames = builtins.concat(packs.map(p => p.name));
  let html = `<div class="topbar"><span class="pill">🕵️ ШПИОН</span><span class="hint">${spy.count} игроков</span></div>
     <h2>Выбери тему</h2>
     <button class="menu-item" data-theme="__rand__"><span class="ttl">🎲 Случайная тема</span></button>`;
  builtins.forEach(t => { html += `<button class="menu-item" data-theme="${esc(t)}"><span class="ttl">${esc(t)}</span></button>`; });
  html += `<div class="hint" style="margin:16px 0 6px">👤 Твои паки (видны только тебе)</div>`;
  if (packs.length) {
    packs.forEach((p, idx) => {
      html += `<div class="list-row" style="gap:8px"><button class="menu-item" data-theme="${esc(p.name)}" style="flex:1;margin:0"><span class="ttl">👤 ${esc(p.name)}</span><span class="sub">${p.words.length} слов</span></button><button class="btn danger" data-del="${idx}" style="width:auto;margin:0;padding:10px 14px">🗑️</button></div>`;
    });
  } else {
    html += `<div class="hint" style="opacity:.7;margin-bottom:6px">Пока нет своих паков</div>`;
  }
  html += `<button class="btn success" id="sp-newpack">➕ Создать свой пак</button>
     <div class="spacer"></div>
     <button class="btn secondary" id="sp-back">← Назад</button>`;
  h(html);
  document.querySelectorAll('[data-theme]').forEach(b => b.addEventListener('click', () => {
    haptic();
    let theme = b.dataset.theme;
    if (theme === '__rand__') theme = rand(allNames);
    spy.theme = theme;
    spyOptions();
  }));
  document.querySelectorAll('[data-del]').forEach(b => b.addEventListener('click', (e) => {
    e.stopPropagation();
    haptic();
    const arr = spyPacks(); arr.splice(+b.dataset.del, 1); spySavePacks(arr);
    spyTheme();
  }));
  on('sp-newpack', 'click', () => { haptic(); spyPackNew(); });
  on('sp-back', 'click', () => { haptic(); spySetup(); });
  setBack(spySetup);
}
function spyPackNew() {
  clearSpyTimer();
  h(`<div class="topbar"><span class="pill">🕵️ ШПИОН</span></div>
     <h2>➕ Свой пак</h2>
     <p class="hint">Слова сохранятся только на этом устройстве — другие игроки их не увидят.</p>
     <input class="input" id="pk-name" placeholder="Название пака (напр. Наши друзья)" maxlength="40">
     <textarea class="input" id="pk-words" rows="8" placeholder="Слова — каждое с новой строки или через запятую.&#10;Например:&#10;Иван&#10;Мария&#10;Сосед"></textarea>
     <p class="hint" id="pk-count">Минимум 3 слова</p>
     <div class="spacer"></div>
     <button class="btn success" id="pk-save">💾 Сохранить пак</button>
     <button class="btn secondary" id="pk-back">← Назад</button>`);
  const upd = () => { const w = spyParseWords(el('pk-words').value); if (el('pk-count')) el('pk-count').textContent = w.length + ' слов (минимум 3)'; };
  on('pk-words', 'input', upd);
  on('pk-save', 'click', () => {
    const name = (el('pk-name').value || '').trim();
    const words = spyParseWords(el('pk-words').value);
    if (!name) { notify('error'); el('pk-name').focus(); return; }
    if (words.length < 3) { notify('error'); el('pk-count').textContent = 'Нужно минимум 3 слова!'; return; }
    const arr = spyPacks();
    const ex = arr.findIndex(p => p.name === name);
    if (ex >= 0) arr[ex] = { name: name, words: words }; else arr.push({ name: name, words: words });
    spySavePacks(arr);
    notify('success');
    spy.theme = name; spyOptions();
  });
  on('pk-back', 'click', () => { haptic(); spyTheme(); });
  setBack(spyTheme);
}
function spyToggle(id, icon, title, sub, val, disabled) {
  return `<div class="optrow"><div class="optmain"><div class="opthd">${icon} ${esc(title)}</div><div class="optsub">${esc(sub)}</div></div>
    <button class="switch ${val ? 'on' : ''} ${disabled ? 'disabled' : ''}" id="${id}"><span class="knob"></span></button></div>`;
}
function spyOptions() {
  const o = spy.opt;
  const timerOpts = [['\u221E', 0], ['15\u0441', 15], ['30\u0441', 30], ['45\u0441', 45], ['60\u0441', 60]];
  const timerChips = timerOpts.map(p => `<button class="chip ${o.timer === p[1] ? 'active' : ''}" data-t="${p[1]}">${p[0]}</button>`).join('');
  const spyChips = [1, 2].map(v => `<button class="chip ${o.spies === v ? 'active' : ''}" data-s="${v}">${v}</button>`).join('');
  h(`

function spyStart() {

  spy.spies = shuffle(range(n)).slice(0, nSpies);
  const others = words.filter(w => w !== spy.word);
  spy.blindWord = others.length ? rand(others) : spy.word;

    }
    h(`<div class="reveal-box"><div class="hint">\u0422\u0435\u043C\u0430: ${esc(spy.theme)}</div>${body}</div>
       <button class="btn" id="sp-next">\u0421\u043A\u0440\u044B\u0442\u044C \u0438 \u043F\u0435\u0440\u0435\u0434\u0430\u0442\u044C \u0434\u0430\u043B\u044C\u0448\u0435</button>`);

  });
}

let croc = {};

    haptic(); croc.diff = b.dataset.diff; crocPlayers();
  }));
  on('cr-back', 'click', () => { haptic(); home(); });

}
function crocPlayers() {
  countPicker({
    title: '🐊 КРОКОДИЛ', sub: 'Минимум 2 игрока. Один объясняет — остальные угадывают.', min: 2, max: 12, value: 4,
    onPick(n) {

function nextCrocWord() {

}
function crocTurn() {

  passDevice('Игрок ' + (explainer + 1) + ' (объясняет)', 'Показать слово', () => {

function mafiaAssign() {
  const o = mafiaClampOpt(mafia.opt);
  const n = o.n;
  const ids = range(n);
  let pool = shuffle(ids);
  const roles = {};
  let mafiaIds = pool.slice(0, o.nMafia); pool = pool.slice(o.nMafia);
  mafiaIds.forEach(i => roles[i] = 'мафия');
  let donId = null;
  if (o.don && mafiaIds.length) { donId = mafiaIds[0]; roles[donId] = 'дон'; }
  let komissar = null, sergeant = null, doctor = null, maniac = null, putana = null;
  if (o.komissar && pool.length) { komissar = pool.shift(); roles[komissar] = 'комиссар'; }
  if (o.sergeant && o.komissar && pool.length) { sergeant = pool.shift(); roles[sergeant] = 'сержант'; }
  if (o.doctor && pool.length) { doctor = pool.shift(); roles[doctor] = 'доктор'; }
  if (o.maniac && pool.length) { maniac = pool.shift(); roles[maniac] = 'маньяк'; }
  if (o.putana && pool.length) { putana = pool.shift(); roles[putana] = 'путана'; }
  pool.forEach(i => roles[i] = 'мирный');
  mafia = { opt: o, count: n, roles, mafiaIds, donId, komissar, sergeant, doctor, maniac, putana, alive: ids.reduce((a, i) => (a[i] = true, a), {}), day: 1, cur: 0 };
  mafiaReveal();
}

function mafiaAliveOf(role) { const idx = range(mafia.count).find(i => mafia.roles[i] === role && mafia.alive[i]); return idx === undefined ? null : idx; }

function mafiaPromoteSergeant() {
  const komAlive = range(mafia.count).some(i => mafia.roles[i] === 'комиссар' && mafia.alive[i]);
  if (komAlive) return false;
  const sgt = range(mafia.count).find(i => mafia.roles[i] === 'сержант' && mafia.alive[i]);
  if (sgt !== undefined) { mafia.roles[sgt] = 'комиссар'; return true; }
  return false;
}
function mafiaResolveNight() {
  const nt = mafia.night;
  let heal = nt.heal, maniac = nt.maniac, victim = nt.victim;
  if (nt.block != null) {
    const br = mafia.roles[nt.block];
    if (br === 'доктор') heal = null;
    if (br === 'маньяк') maniac = null;
    if (isMafiaRole(br)) victim = null;
  }
  const deaths = [];
  if (victim != null && victim !== heal) deaths.push(victim);
  if (maniac != null && maniac !== heal && deaths.indexOf(maniac) < 0) deaths.push(maniac);
  deaths.forEach(i => mafia.alive[i] = false);
  const promoted = mafiaPromoteSergeant();
  let msg;
  if (!deaths.length) msg = (victim != null || maniac != null) ? '💊 Доктор спас — все живы.' : 'Этой ночью никто не погиб.';
  else msg = '☠️ Этой ночью погиб: ' + deaths.map(i => '<b>Игрок ' + (i + 1) + '</b>').join(', ') + '.';
  if (promoted) msg += '<br>🎖️ Сержант стал новым комиссаром.';
  passDevice('Все 🌅', 'Показать итоги ночи', () => {
    h(`<div class="reveal-box"><div style="font-size:48px">🌅</div><h2>Утро ${mafia.day}</h2><p class="big">${msg}</p></div>
       <button class="btn" id="mf-cont">Продолжить</button>`);
    on('mf-cont', 'click', () => { haptic(); const w = mafiaCheckWin(); if (w) return mafiaEnd(w); mafiaDay(); });
  });
}
function mafiaCheckWin() {
  const alive = range(mafia.count).filter(i => mafia.alive[i]);
  const total = alive.length;
  const aliveMafia = alive.filter(i => isMafiaRole(mafia.roles[i])).length;
  const maniacAlive = alive.some(i => mafia.roles[i] === 'маньяк');
  if (maniacAlive && total <= 2) return 'maniac';
  if (aliveMafia === 0 && !maniacAlive) return 'civilians';
  if (aliveMafia > 0 && aliveMafia >= (total - aliveMafia)) return 'mafia';
  return null;
}
function mafiaDay() {
  setBack(null);
  const aliveP = range(mafia.count).filter(i => mafia.alive[i]);
  const rows = aliveP.map(i => 'Игрок ' + (i + 1)).join(', ');

}
function mafiaVoteStep() {
  if (mafia.voteIdx >= mafia.voteOrder.length) return mafiaVoteResult();
  const voter = mafia.voteOrder[mafia.voteIdx];
  passDevice('Игрок ' + (voter + 1) + ' голосует', 'Голосовать', () => {

function mafiaVoteResult() {
  const entries = Object.entries(mafia.votes);
  let out = '', eliminated = null;
  if (!entries.length) { out = 'Никто не проголосовал — день прошёл спокойно.'; }
  else {
    const max = Math.max(...entries.map(e => e[1]));
    const top = entries.filter(e => e[1] === max).map(e => +e[0]);
    if (top.length > 1) { out = 'Голоса разделились поровну — никого не выгнали.'; }
    else {
      eliminated = top[0]; mafia.alive[eliminated] = false;
      const role = mafia.roles[eliminated];
      out = `Город изгнал <b>Игрока ${eliminated + 1}</b>. Его роль: <b>${esc(role)}</b> ${ROLE_INFO[role].emoji}`;
      if (mafiaPromoteSergeant()) out += '<br>🎖️ Сержант стал новым комиссаром.';
    }

  h(`<div class="reveal-box"><div style="font-size:48px">⚖️</div><h2>Итог голосования</h2><p class="big">${out}</p></div>
     <button class="btn" id="mf-cont">Продолжить</button>`);

function routeStart() {
  // Бот может открыть конкретную игру через ?game=... в URL
  let g = '';
  try { g = new URLSearchParams(location.search).get('game') || ''; } catch (e) {}
  // или через start_param (startapp=...) в Telegram
  try { if (!g && tg && tg.initDataUnsafe && tg.initDataUnsafe.start_param) g = tg.initDataUnsafe.start_param; } catch (e) {}
  switch (g) {
    case 'spy': return spySetup();
    case 'mafia': return mafiaSetup();
    case 'crocodile': case 'croc': return crocSetup();
    case 'tod': return todSetup();
    default: return home();
  }
}

// ---------- room subscription ----------
let RoomSub = { code: null, ref: null, handler: null };
function detachRoom() {
  if (RoomSub.ref && RoomSub.handler) { try { RoomSub.ref.off('value', RoomSub.handler); } catch (e) {} }
  RoomSub = { code: null, ref: null, handler: null };
}
function setupPresence(code) {
  try {
    const r = DB.ref('rooms/' + code + '/players/' + pid() + '/online');
    r.onDisconnect().set(false);
    r.set(true);
  } catch (e) {}
}
function watchRoom(code) {
  detachRoom();
  const ref = roomRef(code);
  const handler = ref.on('value', snap => {
    const room = snap.val();
    if (!room || !room.meta) { detachRoom(); alert('\u041A\u043E\u043C\u043D\u0430\u0442\u0430 \u0437\u0430\u043A\u0440\u044B\u0442\u0430'); home(); return; }
    renderRoom(code, room);
  });
  RoomSub = { code, ref, handler };
}
function leaveRoom(code) {
  detachRoom();
  try { DB.ref('rooms/' + code + '/players/' + pid()).remove(); } catch (e) {}
  home();
}

function createRoom(game) {
  const code = genCode();
  const now = Date.now();
  roomRef(code).set({
    meta: { game, hostId: pid(), status: 'lobby', createdAt: now },
    players: { [pid()]: { name: pname(), online: true, joinedAt: now } }
  }).then(() => { setupPresence(code); watchRoom(code); })
    .catch(() => alert('\u041D\u0435 \u0443\u0434\u0430\u043B\u043E\u0441\u044C \u0441\u043E\u0437\u0434\u0430\u0442\u044C \u043A\u043E\u043C\u043D\u0430\u0442\u0443'));
}
function joinRoom(code) {
  roomRef(code).once('value').then(snap => {
    const room = snap.val();
    if (!room || !room.meta) { alert('\u041A\u043E\u043C\u043D\u0430\u0442\u0430 \u043D\u0435 \u043D\u0430\u0439\u0434\u0435\u043D\u0430'); return; }
    const now = Date.now();
    DB.ref('rooms/' + code + '/players/' + pid()).set({ name: pname(), online: true, joinedAt: now })
      .then(() => { setupPresence(code); watchRoom(code); });
  }).catch(() => alert('\u041E\u0448\u0438\u0431\u043A\u0430 \u043F\u043E\u0434\u043A\u043B\u044E\u0447\u0435\u043D\u0438\u044F'));
}

// ---------- render dispatch ----------
function renderRoom(code, room) {
  if (room.meta.status === 'lobby') return lobbyView(code, room);
  const g = room.meta.game;
  if (g === 'spy') return renderSpy(code, room);
  if (g === 'croc') return renderCroc(code, room);
  if (g === 'tod') return renderTod(code, room);
  if (g === 'mafia') return renderMafia(code, room);
}

  let optUI = '', minHint = '';
  if (amHost) {
    if (g === 'spy') {
      const themes = Object.keys(D.THEMES);
      const cur = opt || '__rand__';
      const btns = [{ k: '__rand__', t: '\uD83C\uDFB2 \u0421\u043B\u0443\u0447\u0430\u0439\u043D\u0430\u044F' }].concat(themes.map(t => ({ k: t, t })))
        .map(o => `<button class="chip ${cur === o.k ? 'active' : ''}" data-opt="${esc(o.k)}" style="font-size:14px">${esc(o.t)}</button>`).join('');
      optUI = `<h3>\u0422\u0435\u043C\u0430</h3><div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(120px,1fr))">${btns}</div>`;
      minHint = '\u041C\u0438\u043D\u0438\u043C\u0443\u043C 3 \u0438\u0433\u0440\u043E\u043A\u0430';
    } else if (g === 'croc') {
      const diffs = Object.keys(D.CROCODILE_WORDS);
      const cur = opt || diffs[0];
      optUI = `<h3>\u0421\u043B\u043E\u0436\u043D\u043E\u0441\u0442\u044C</h3>` + diffs.map(d => `<button class="btn ${cur === d ? 'success' : 'secondary'}" data-opt="${esc(d)}">${esc(d)}${cur === d ? ' \u2713' : ''}</button>`).join('');
      minHint = '\u041C\u0438\u043D\u0438\u043C\u0443\u043C 2 \u0438\u0433\u0440\u043E\u043A\u0430';
    } else if (g === 'tod') {
      const cur = opt || 'normal';
      optUI = `<h3>\u0420\u0435\u0436\u0438\u043C</h3>
        <button class="btn ${cur === 'normal' ? 'success' : 'secondary'}" data-opt="normal">\uD83D\uDE0A \u041E\u0431\u044B\u0447\u043D\u044B\u0439${cur === 'normal' ? ' \u2713' : ''}</button>
        <button class="btn ${cur === '18plus' ? 'success' : 'secondary'}" data-opt="18plus">\uD83D\uDD1E 18+${cur === '18plus' ? ' \u2713' : ''}</button>`;
      minHint = '\u041C\u0438\u043D\u0438\u043C\u0443\u043C 2 \u0438\u0433\u0440\u043E\u043A\u0430';
    } else if (g === 'mafia') {
      const n = players.length;
      const defs = { nMafia: 1, doctor: true, komissar: true, sergeant: false, don: false, maniac: false, putana: false };
      const mo = Object.assign({}, defs, (room.meta.mopt || {}));
      const maxM = Math.max(1, Math.floor((n - 1) / 2));
      if (mo.nMafia > maxM) mo.nMafia = maxM; if (mo.nMafia < 1) mo.nMafia = 1;
      if (!mo.komissar) mo.sergeant = false;
      const slots = mo.nMafia + (mo.komissar ? 1 : 0) + (mo.sergeant ? 1 : 0) + (mo.doctor ? 1 : 0) + (mo.maniac ? 1 : 0) + (mo.putana ? 1 : 0);
      const tog = (f, label, onv) => `<button class="btn ${onv ? 'success' : 'secondary'}" data-mopt="${f}">${label}${onv ? ' \u2713' : ''}</button>`;
      optUI = `<h3>\u041d\u0430\u0441\u0442\u0440\u043e\u0439\u043a\u0430 \u0440\u043e\u043b\u0435\u0439</h3>
        <div class="optrow"><div class="optmain"><div class="opthd">\ud83d\udd2a \u041c\u0430\u0444\u0438\u0438</div><div class="optsub">\u0418\u0433\u0440\u043e\u043a\u043e\u0432: ${n}, \u043c\u0430\u043a\u0441 ${maxM}</div></div><div class="stepper"><button data-mstep="dec">\u2212</button><span>${mo.nMafia}</span><button data-mstep="inc">+</button></div></div>
        <p class="hint">\u0411\u0430\u0437\u043e\u0432\u044b\u0435 \u0440\u043e\u043b\u0438</p>
        ${tog('doctor', '\ud83d\udc8a \u0414\u043e\u043a\u0442\u043e\u0440', mo.doctor)}
        ${tog('komissar', '\ud83d\udd75\ufe0f \u041a\u043e\u043c\u0438\u0441\u0441\u0430\u0440', mo.komissar)}
        <p class="hint">\u0414\u043e\u043f\u043e\u043b\u043d\u0438\u0442\u0435\u043b\u044c\u043d\u044b\u0435 \u0440\u043e\u043b\u0438</p>
        ${tog('sergeant', '\ud83c\udf96\ufe0f \u0421\u0435\u0440\u0436\u0430\u043d\u0442' + (mo.komissar ? '' : ' (\u043d\u0443\u0436\u0435\u043d \u043a\u043e\u043c\u0438\u0441\u0441\u0430\u0440)'), mo.sergeant && mo.komissar)}
        ${tog('don', '\ud83c\udfa9 \u0414\u043e\u043d', mo.don)}
        ${tog('maniac', '\ud83e\ude93 \u041c\u0430\u043d\u044c\u044f\u043a', mo.maniac)}
        ${tog('putana', '\ud83d\udc8b \u041f\u0443\u0442\u0430\u043d\u0430', mo.putana)}
        <p class="hint">\ud83d\udc64 \u041c\u0438\u0440\u043d\u044b\u0445: ${Math.max(0, n - slots)}${slots > n ? ' \u26a0\ufe0f \u0441\u043b\u0438\u0448\u043a\u043e\u043c \u043c\u043d\u043e\u0433\u043e \u0440\u043e\u043b\u0435\u0439' : ''}</p>`;
      minHint = '\u041c\u0438\u043d\u0438\u043c\u0443\u043c 4 \u0438\u0433\u0440\u043e\u043a\u0430';
    }
  }

  const hostControls = amHost
    ? `${optUI}<div class="spacer"></div><button class="btn success" id="lb-start">\u25B6\uFE0F \u041D\u0430\u0447\u0430\u0442\u044C \u0438\u0433\u0440\u0443</button><p class="hint center">${esc(minHint)}</p>`
    : `<p class="hint center">\u0416\u0434\u0451\u043C, \u043F\u043E\u043A\u0430 \u0432\u0435\u0434\u0443\u0449\u0438\u0439 \u043D\u0430\u0447\u043D\u0451\u0442 \u0438\u0433\u0440\u0443\u2026</p>`;

  h(`<div class="topbar"><span class="pill">${gameTitle(g)} \u00B7 \uD83C\uDF10</span></div>
     <div class="card center"><h3>\u041A\u043E\u0434 \u043A\u043E\u043C\u043D\u0430\u0442\u044B</h3><div class="huge">${esc(code)}</div><p class="hint">\u0414\u0440\u0443\u0437\u044C\u044F \u0432\u0432\u043E\u0434\u044F\u0442 \u0435\u0433\u043E \u0432 \u00AB\u0412\u043E\u0439\u0442\u0438 \u043F\u043E \u043A\u043E\u0434\u0443\u00BB</p></div>
     <div class="card"><h3>\u0418\u0433\u0440\u043E\u043A\u0438 (${players.length})</h3>${plist}</div>
     ${hostControls}
     <button class="btn secondary" id="o-leave">\uD83D\uDEAA \u0412\u044B\u0439\u0442\u0438</button>`);

  document.querySelectorAll('[data-opt]').forEach(b => b.addEventListener('click', () => { haptic(); DB.ref('rooms/' + code + '/meta/opt').set(b.dataset.opt); }));
  document.querySelectorAll('[data-mstep]').forEach(b => b.addEventListener('click', () => {
    haptic();
    const nn = players.length; const mx = Math.max(1, Math.floor((nn - 1) / 2));
    const cur = (room.meta.mopt && room.meta.mopt.nMafia) || 1;
    let v = b.dataset.mstep === 'inc' ? cur + 1 : cur - 1;
    if (v < 1) v = 1; if (v > mx) v = mx;
    DB.ref('rooms/' + code + '/meta/mopt/nMafia').set(v);
  }));
  document.querySelectorAll('[data-mopt]').forEach(b => b.addEventListener('click', () => {
    haptic();
    const f = b.dataset.mopt;
    const defs = { doctor: true, komissar: true, sergeant: false, don: false, maniac: false, putana: false };
    const mo = room.meta.mopt || {};
    const cur = (f in mo) ? mo[f] : defs[f];
    if (f === 'sergeant') { const kom = ('komissar' in mo) ? mo.komissar : defs.komissar; if (!kom) return; }
    const upd = {}; upd[f] = !cur;
    if (f === 'komissar' && cur) upd.sergeant = false;
    DB.ref('rooms/' + code + '/meta/mopt').update(upd);
  }));
  if (amHost) on('lb-start', 'click', () => {
    haptic();
    if (g === 'spy') oSpyStart(code, room);
    else if (g === 'croc') oCrocStart(code, room);
    else if (g === 'tod') oTodStart(code, room);
    else if (g === 'mafia') oMafiaStart(code, room);
  });
  on('o-leave', 'click', () => { haptic(); leaveRoom(code); });
}

// ====================== SPY ONLINE ======================
function oSpyStart(code, room) {
  const ids = playersArr(room).map(p => p.id);
  if (ids.length < 3) { alert('\u041D\u0443\u0436\u043D\u043E \u043C\u0438\u043D\u0438\u043C\u0443\u043C 3 \u0438\u0433\u0440\u043E\u043A\u0430'); return; }
  let theme = room.meta.opt || '__rand__';
  const themes = Object.keys(D.THEMES);
  if (theme === '__rand__' || !D.THEMES[theme]) theme = rand(themes);
  const spyId = rand(ids);
  const word = rand(D.THEMES[theme]);
  roomRef(code).update({ 'meta/status': 'playing', state: { phase: 'reveal', theme, word, spyId, votes: {} } });
}

  const me = pid(); const s = room.state || {}; const players = playersArr(room); const amHost = isHost(room);

       <div class="reveal-box"><div class="hint">\u0422\u0435\u043C\u0430: ${esc(s.theme)}</div>

       </div>
       ${amHost ? '<button class="btn" id="sp-vote">\uD83D\uDDF3\uFE0F \u0412\u0441\u0435 \u0433\u043E\u0442\u043E\u0432\u044B \u2014 \u043A \u0433\u043E\u043B\u043E\u0441\u043E\u0432\u0430\u043D\u0438\u044E</button>' : '<p class="hint center">\u041E\u0431\u0441\u0443\u0436\u0434\u0430\u0439\u0442\u0435 \u0432\u0441\u043B\u0443\u0445. \u0416\u0434\u0451\u043C \u0432\u0435\u0434\u0443\u0449\u0435\u0433\u043E\u2026</p>'}

    if (amHost) on('sp-vote', 'click', () => { haptic(); stateRef(code).update({ phase: 'vote', votes: {} }); });
    on('o-leave', 'click', () => { haptic(); leaveRoom(code); });
    return;
  }

    const voted = Object.keys(votes).length;
    h(`<div class="topbar"><span class="pill">\uD83D\uDDF3\uFE0F \u0413\u043E\u043B\u043E\u0441\u043E\u0432\u0430\u043D\u0438\u0435 \u00B7 ${esc(code)}</span></div>
       <h2>\u041A\u0442\u043E \u0448\u043F\u0438\u043E\u043D?</h2><p class="hint">\u041F\u0440\u043E\u0433\u043E\u043B\u043E\u0441\u043E\u0432\u0430\u043B\u043E: ${voted}/${players.length}</p>
       ${btns}
       ${amHost ? '<button class="btn warn" id="sp-res">\u041F\u043E\u043A\u0430\u0437\u0430\u0442\u044C \u0440\u0435\u0437\u0443\u043B\u044C\u0442\u0430\u0442</button>' : ''}
       <button class="btn secondary" id="o-leave">\uD83D\uDEAA \u0412\u044B\u0439\u0442\u0438</button>`);
    document.querySelectorAll('[data-v]').forEach(b => b.addEventListener('click', () => { haptic(); DB.ref('rooms/' + code + '/state/votes/' + me).set(b.dataset.v); }));
    if (amHost) on('sp-res', 'click', () => { haptic(); stateRef(code).update({ phase: 'result' }); });

    Object.keys(tally).forEach(t => { if (tally[t] > max) { max = tally[t]; accused = t; } });
    const spyName = nameIn(players, s.spyId);
    const correct = accused === s.spyId;
    h(`<div class="topbar"><span class="pill">\uD83D\uDD75\uFE0F \u0418\u0442\u043E\u0433 \u00B7 ${esc(code)}</span></div>

         <p class="hint">${correct ? '\u041C\u0438\u0440\u043D\u044B\u0435 \u043F\u043E\u0431\u0435\u0434\u0438\u043B\u0438!' : '\u0428\u043F\u0438\u043E\u043D \u0443\u0441\u043A\u043E\u043B\u044C\u0437\u043D\u0443\u043B!'}</p>
       </div>
       ${amHost ? '<button class="btn" id="sp-again">\uD83D\uDD01 \u041D\u043E\u0432\u044B\u0439 \u0440\u0430\u0443\u043D\u0434</button>' : '<p class="hint center">\u0416\u0434\u0451\u043C \u0432\u0435\u0434\u0443\u0449\u0435\u0433\u043E\u2026</p>'}
       <button class="btn secondary" id="o-leave">\uD83D\uDEAA \u0412\u044B\u0439\u0442\u0438</button>`);
    if (amHost) on('sp-again', 'click', () => { haptic(); roomRef(code).update({ 'meta/status': 'lobby', state: null }); });
    on('o-leave', 'click', () => { haptic(); leaveRoom(code); });

  }

// ====================== CROCODILE ONLINE ======================
function oCrocStart(code, room) {
  const ids = playersArr(room).map(p => p.id);
  if (ids.length < 2) { alert('\u041D\u0443\u0436\u043D\u043E \u043C\u0438\u043D\u0438\u043C\u0443\u043C 2 \u0438\u0433\u0440\u043E\u043A\u0430'); return; }
  const diffs = Object.keys(D.CROCODILE_WORDS);
  const diff = (room.meta.opt && D.CROCODILE_WORDS[room.meta.opt]) ? room.meta.opt : diffs[0];
  const order = shuffle(ids); const scores = {}; ids.forEach(id => scores[id] = 0);
  roomRef(code).update({ 'meta/status': 'playing', state: { phase: 'play', diff, order, turn: 0, word: rand(D.CROCODILE_WORDS[diff]), scores } });
}
function scoreboard(scores, players, medals) {
  scores = scores || {};
  const arr = players.map(p => ({ name: p.name, s: scores[p.id] || 0 })).sort((a, b) => b.s - a.s);
  const m = ['\uD83E\uDD47', '\uD83E\uDD48', '\uD83E\uDD49'];
  return arr.map((o, i) => `<div class="scorerow"><span>${medals ? (m[i] || (i + 1) + '.') : ''} ${esc(o.name)}</span><b>${o.s}</b></div>`).join('');
}
function renderCroc(code, room) {
  const me = pid(); const s = room.state || {}; const players = playersArr(room); const amHost = isHost(room);
  const order = s.order || [];
  const explainerId = order.length ? order[s.turn % order.length] : null;
  if (s.phase === 'play') {
    const board = scoreboard(s.scores, players, true);
    if (me === explainerId) {
      h(`<div class="topbar"><span class="pill">\uD83D\uDC0A ${esc(s.diff)} \u00B7 ${esc(code)}</span></div>
         <div class="reveal-box"><h3>\u041E\u0431\u044A\u044F\u0441\u043D\u0438 \u0441\u043B\u043E\u0432\u043E (\u0431\u0435\u0437 \u043E\u0434\u043D\u043E\u043A\u043E\u0440\u0435\u043D\u043D\u044B\u0445):</h3><div class="huge">${esc(s.word)}</div></div>
         <button class="btn success" id="cr-ok">\u2705 \u0423\u0433\u0430\u0434\u0430\u043B\u0438 (+1)</button>
         <button class="btn warn" id="cr-skip">\u23ED\uFE0F \u0414\u0440\u0443\u0433\u043E\u0435 \u0441\u043B\u043E\u0432\u043E</button>
         <button class="btn" id="cr-next">\uD83D\uDC49 \u041F\u0435\u0440\u0435\u0434\u0430\u0442\u044C \u0445\u043E\u0434</button>
         <div class="card">${board}</div>
         ${amHost ? '<button class="btn secondary" id="cr-end">\uD83C\uDFC1 \u0417\u0430\u0432\u0435\u0440\u0448\u0438\u0442\u044C</button>' : ''}
         <button class="btn secondary" id="o-leave">\uD83D\uDEAA \u0412\u044B\u0439\u0442\u0438</button>`);
      on('cr-ok', 'click', () => { notify('success'); const ns = Object.assign({}, s.scores); ns[explainerId] = (ns[explainerId] || 0) + 1; stateRef(code).update({ scores: ns, word: rand(D.CROCODILE_WORDS[s.diff]) }); });
      on('cr-skip', 'click', () => { haptic(); stateRef(code).update({ word: rand(D.CROCODILE_WORDS[s.diff]) }); });
      on('cr-next', 'click', () => { haptic(); stateRef(code).update({ turn: s.turn + 1, word: rand(D.CROCODILE_WORDS[s.diff]) }); });
      if (amHost) on('cr-end', 'click', () => { haptic(); stateRef(code).update({ phase: 'end' }); });
    } else {
      h(`<div class="topbar"><span class="pill">\uD83D\uDC0A ${esc(s.diff)} \u00B7 ${esc(code)}</span></div>
         <div class="reveal-box"><div style="font-size:48px">\uD83E\uDD2B</div><h2>${esc(nameIn(players, explainerId))} \u043E\u0431\u044A\u044F\u0441\u043D\u044F\u0435\u0442\u2026</h2><p class="hint">\u0423\u0433\u0430\u0434\u044B\u0432\u0430\u0439\u0442\u0435 \u0432\u0441\u043B\u0443\u0445!</p></div>
         <div class="card">${board}</div>
         <button class="btn secondary" id="o-leave">\uD83D\uDEAA \u0412\u044B\u0439\u0442\u0438</button>`);
    }
    on('o-leave', 'click', () => { haptic(); leaveRoom(code); });
    return;
  }
  if (s.phase === 'end') {
    h(`<div class="topbar"><span class="pill">\uD83D\uDC0A \u0418\u0442\u043E\u0433\u0438 \u00B7 ${esc(code)}</span></div><h2>\uD83C\uDFC6 \u0420\u0435\u0437\u0443\u043B\u044C\u0442\u0430\u0442\u044B</h2><div class="card">${scoreboard(s.scores, players, true)}</div>
       ${amHost ? '<button class="btn" id="cr-again">\uD83D\uDD01 \u041D\u043E\u0432\u0430\u044F \u0438\u0433\u0440\u0430</button>' : '<p class="hint center">\u0416\u0434\u0451\u043C \u0432\u0435\u0434\u0443\u0449\u0435\u0433\u043E\u2026</p>'}
       <button class="btn secondary" id="o-leave">\uD83D\uDEAA \u0412\u044B\u0439\u0442\u0438</button>`);
    if (amHost) on('cr-again', 'click', () => { haptic(); roomRef(code).update({ 'meta/status': 'lobby', state: null }); });
    on('o-leave', 'click', () => { haptic(); leaveRoom(code); });
    return;
  }
}

// ====================== TRUTH OR DARE ONLINE ======================
function oTodStart(code, room) {
  const ids = playersArr(room).map(p => p.id);
  if (ids.length < 2) { alert('\u041D\u0443\u0436\u043D\u043E \u043C\u0438\u043D\u0438\u043C\u0443\u043C 2 \u0438\u0433\u0440\u043E\u043A\u0430'); return; }
  const mode = room.meta.opt === '18plus' ? '18plus' : 'normal';
  roomRef(code).update({ 'meta/status': 'playing', state: { phase: 'play', mode, order: shuffle(ids), turn: 0, current: null } });
}
function renderTod(code, room) {
  const me = pid(); const s = room.state || {}; const players = playersArr(room);

// ====================== MAFIA ONLINE ======================
function oMafiaWin(roles, alive) {
  let total = 0, m = 0, maniac = false;
  Object.keys(alive).forEach(id => { if (alive[id]) { total++; const r = roles[id]; if (r === 'мафия' || r === 'дон') m++; if (r === 'маньяк') maniac = true; } });
  if (maniac && total <= 2) return 'maniac';
  if (m === 0 && !maniac) return 'civilians';
  if (m > 0 && m >= (total - m)) return 'mafia';
  return null;
}
function oMafiaPromote(roles, alive) {
  const komAlive = Object.keys(alive).some(id => roles[id] === 'комиссар' && alive[id]);
  if (komAlive) return roles;
  const sgt = Object.keys(alive).find(id => roles[id] === 'сержант' && alive[id]);
  if (!sgt) return roles;
  const nr = Object.assign({}, roles); nr[sgt] = 'комиссар'; return nr;
}
function oMafiaStart(code, room) {
  const ids = playersArr(room).map(p => p.id); const n = ids.length;
  if (n < 4) { alert('Нужно минимум 4 игрока'); return; }
  const def = { nMafia: 1, doctor: true, komissar: true, sergeant: false, don: false, maniac: false, putana: false };
  const o = Object.assign({}, def, (room.meta.mopt || {}));
  const maxM = Math.max(1, Math.floor((n - 1) / 2));
  if (o.nMafia > maxM) o.nMafia = maxM; if (o.nMafia < 1) o.nMafia = 1;
  if (!o.komissar) o.sergeant = false;
  const slots = o.nMafia + (o.komissar ? 1 : 0) + (o.sergeant ? 1 : 0) + (o.doctor ? 1 : 0) + (o.maniac ? 1 : 0) + (o.putana ? 1 : 0);
  if (slots > n) { alert('Слишком много ролей для ' + n + ' игроков'); return; }
  const sh = shuffle(ids); const roles = {}; let i = 0;
  for (let k = 0; k < o.nMafia; k++) roles[sh[i++]] = 'мафия';
  if (o.don) roles[sh[0]] = 'дон';
  if (o.komissar) roles[sh[i++]] = 'комиссар';
  if (o.sergeant && o.komissar) roles[sh[i++]] = 'сержант';
  if (o.doctor) roles[sh[i++]] = 'доктор';
  if (o.maniac) roles[sh[i++]] = 'маньяк';
  if (o.putana) roles[sh[i++]] = 'путана';
  while (i < sh.length) roles[sh[i++]] = 'мирный';
  const alive = {}; ids.forEach(id => alive[id] = true);
  roomRef(code).update({ 'meta/status': 'playing', state: { phase: 'role', roles, alive, day: 1, night: {}, votes: {}, log: '' } });
}
function renderMafia(code, room) {
  const me = pid(); const s = room.state || {}; const players = playersArr(room); const amHost = isHost(room);
  const roles = s.roles || {}; const alive = s.alive || {};
  const myRole = roles[me]; const dead = !alive[me];
  const aliveIds = players.filter(p => alive[p.id]).map(p => p.id);
  const info = ROLE_INFO[myRole] || ROLE_INFO['мирный'];

  if (s.phase === 'role') {
    let mates = '';
    if (myRole === 'мафия' || myRole === 'дон') {
      const others = players.filter(p => (roles[p.id] === 'мафия' || roles[p.id] === 'дон') && p.id !== me).map(p => p.name + (roles[p.id] === 'дон' ? ' 🎩' : ''));
      if (others.length) mates = '<p class="hint">Напарники: ' + esc(others.join(', ')) + '</p>';
    }
    h(`<div class="topbar"><span class="pill">🔪 Мафия · ${esc(code)}</span></div>
       <div class="reveal-box"><div style="font-size:52px">${info.emoji}</div><h2>${esc(String(myRole || '').toUpperCase())}</h2><p>${info.text}</p>${mates}</div>
       ${amHost ? '<button class="btn" id="mf-night">🌙 Начать ночь</button>' : '<p class="hint center">Запомни роль. Ждём ведущего…</p>'}
       <button class="btn secondary" id="o-leave">🚪 Выйти</button>`);
    if (amHost) on('mf-night', 'click', () => { haptic(); stateRef(code).update({ phase: 'night', night: {}, log: '' }); });
    on('o-leave', 'click', () => { haptic(); leaveRoom(code); });
    return;
  }

  if (s.phase === 'night') {
    const night = s.night || {};
    let body = '';
    const banner = s.log ? `<div class="card center"><p>${esc(s.log)}</p></div>` : '';
    let wireField = null;
    const isMaf = id => roles[id] === 'мафия' || roles[id] === 'дон';
    if (dead) {
      body = '<div class="reveal-box"><div style="font-size:48px">👻</div><h2>Вы выбыли</h2><p class="hint">Наблюдайте за игрой.</p></div>';
    } else if (myRole === 'дон') {
      const killT = players.filter(p => alive[p.id] && !isMaf(p.id));
      const checkT = players.filter(p => alive[p.id] && p.id !== me);
      body = '<h2>🎩 Дон</h2><h3>🔪 Кого убить?</h3>' +
        killT.map(p => `<button class="btn ${night.victim === p.id ? 'danger' : 'secondary'}" data-dk="${p.id}">${esc(p.name)}${night.victim === p.id ? ' ✓' : ''}</button>`).join('') +
        '<h3>🕵️ Кто комиссар?</h3>' +
        checkT.map(p => `<button class="btn ${night.doncheck === p.id ? 'warn' : 'secondary'}" data-dc="${p.id}">${esc(p.name)}${night.doncheck === p.id ? ' ✓' : ''}</button>`).join('');
      if (night.doncheck) { const isK = roles[night.doncheck] === 'комиссар'; body += `<div class="card center"><b>${esc(nameIn(players, night.doncheck))}</b>: ${isK ? '🕵️ КОМИССАР' : 'не комиссар'}</div>`; }
    } else if (myRole === 'мафия') {
      const targets = players.filter(p => alive[p.id] && !isMaf(p.id));
      body = '<h2>🔪 Кого убить?</h2>' + targets.map(p => `<button class="btn ${night.victim === p.id ? 'danger' : 'secondary'}" data-t="${p.id}">${esc(p.name)}${night.victim === p.id ? ' ✓' : ''}</button>`).join('');
      wireField = 'victim';
    } else if (myRole === 'доктор') {
      const targets = players.filter(p => alive[p.id]);
      body = '<h2>💊 Кого спасти?</h2>' + targets.map(p => `<button class="btn ${night.heal === p.id ? 'success' : 'secondary'}" data-t="${p.id}">${esc(p.name)}${night.heal === p.id ? ' ✓' : ''}</button>`).join('');
      wireField = 'heal';
    } else if (myRole === 'комиссар') {
      const targets = players.filter(p => alive[p.id] && p.id !== me);
      body = '<h2>🕵️ Кого проверить?</h2>' + targets.map(p => `<button class="btn ${night.check === p.id ? 'warn' : 'secondary'}" data-t="${p.id}">${esc(p.name)}${night.check === p.id ? ' ✓' : ''}</button>`).join('');
      if (night.check) { const mf = isMaf(night.check); body += `<div class="card center"><b>${esc(nameIn(players, night.check))}</b>: ${mf ? '🔪 МАФИЯ' : '✅ не мафия'}</div>`; }
      wireField = 'check';
    } else if (myRole === 'сержант') {
      if (night.check) { const mf = isMaf(night.check); body = `<div class="reveal-box"><div style="font-size:44px">🎖️</div><h2>Сержант</h2><p>Комиссар проверил <b>${esc(nameIn(players, night.check))}</b>:</p><p class="big">${mf ? '🔪 МАФИЯ' : '✅ не мафия'}</p></div>`; }
      else body = '<div class="reveal-box"><div style="font-size:48px">🎖️</div><h2>Сержант</h2><p class="hint">Ждём проверки комиссара…</p></div>';
    } else if (myRole === 'маньяк') {
      const targets = players.filter(p => alive[p.id] && p.id !== me);
      body = '<h2>🪓 Кого убить?</h2>' + targets.map(p => `<button class="btn ${night.maniac === p.id ? 'danger' : 'secondary'}" data-t="${p.id}">${esc(p.name)}${night.maniac === p.id ? ' ✓' : ''}</button>`).join('');
      wireField = 'maniac';
    } else if (myRole === 'путана') {
      const targets = players.filter(p => alive[p.id] && p.id !== me);
      body = '<h2>💋 Кого заблокировать?</h2>' + targets.map(p => `<button class="btn ${night.block === p.id ? 'warn' : 'secondary'}" data-t="${p.id}">${esc(p.name)}${night.block === p.id ? ' ✓' : ''}</button>`).join('');
      wireField = 'block';
    } else {
      body = '<div class="reveal-box"><div style="font-size:48px">🌙</div><h2>Город спит…</h2><p class="hint">Ждём действий ночных ролей.</p></div>';
    }
    const hostBtn = amHost ? (night.victim ? '<button class="btn" id="mf-resolve">☀️ Завершить ночь</button>' : '<p class="hint center">Ждём, пока мафия выберет жертву…</p>') : '';
    h(`<div class="topbar"><span class="pill">🌙 Ночь ${s.day} · ${esc(code)}</span></div>${banner}${body}${hostBtn}<button class="btn secondary" id="o-leave">🚪 Выйти</button>`);
    if (wireField) document.querySelectorAll('[data-t]').forEach(b => b.addEventListener('click', () => { haptic('medium'); DB.ref('rooms/' + code + '/state/night/' + wireField).set(b.dataset.t); }));
    document.querySelectorAll('[data-dk]').forEach(b => b.addEventListener('click', () => { haptic('medium'); DB.ref('rooms/' + code + '/state/night/victim').set(b.dataset.dk); }));
    document.querySelectorAll('[data-dc]').forEach(b => b.addEventListener('click', () => { haptic('medium'); DB.ref('rooms/' + code + '/state/night/doncheck').set(b.dataset.dc); }));
    if (amHost && night.victim) on('mf-resolve', 'click', () => {
      haptic();
      const nt = s.night || {};
      let heal = nt.heal, maniacT = nt.maniac, victim = nt.victim;
      if (nt.block) { const br = roles[nt.block]; if (br === 'доктор') heal = null; if (br === 'маньяк') maniacT = null; if (br === 'мафия' || br === 'дон') victim = null; }
      const nalive = Object.assign({}, alive); const deaths = [];
      if (victim && victim !== heal) deaths.push(victim);
      if (maniacT && maniacT !== heal && deaths.indexOf(maniacT) < 0) deaths.push(maniacT);
      deaths.forEach(id => nalive[id] = false);
      const nroles = oMafiaPromote(roles, nalive);
      let log;
      if (!deaths.length) log = (victim || maniacT) ? '💊 Доктор спас — все живы.' : 'Ночью никто не погиб.';
      else log = '☠️ Ночью погиб: ' + deaths.map(id => nameIn(players, id)).join(', ');
      if (nroles !== roles) log += ' 🎖️ Сержант стал комиссаром.';
      const w = oMafiaWin(nroles, nalive);
      stateRef(code).update({ alive: nalive, roles: nroles, log, phase: w ? 'end' : 'day', winner: w || null });
    });
    on('o-leave', 'click', () => { haptic(); leaveRoom(code); });
    return;
  }

  if (s.phase === 'day') {
    const aliveNames = players.filter(p => alive[p.id]).map(p => p.name).join(', ');
    h(`<div class="topbar"><span class="pill">☀️ День ${s.day} · ${esc(code)}</span></div>
       <div class="reveal-box"><div style="font-size:44px">🌅</div><p class="big">${esc(s.log || '')}</p></div>
       <div class="card"><h3>Живые</h3><p>${esc(aliveNames)}</p></div>
       ${amHost ? '<button class="btn warn" id="mf-vote">🗳️ Начать голосование</button>' : '<p class="hint center">Обсуждайте. Ждём ведущего…</p>'}
       <button class="btn secondary" id="o-leave">🚪 Выйти</button>`);
    if (amHost) on('mf-vote', 'click', () => { haptic(); stateRef(code).update({ phase: 'vote', votes: {} }); });
    on('o-leave', 'click', () => { haptic(); leaveRoom(code); });
    return;
  }

  if (s.phase === 'vote') {
    const votes = s.votes || {}; const myVote = votes[me];
    let body;
    if (dead) {
      body = '<div class="reveal-box"><div style="font-size:48px">👻</div><h2>Вы выбыли</h2><p class="hint">Наблюдайте за голосованием.</p></div>';
    } else {
      const targets = players.filter(p => alive[p.id] && p.id !== me);
      body = '<h2>🗳️ Кого изгнать?</h2>' + targets.map(p => `<button class="btn ${myVote === p.id ? 'danger' : 'secondary'}" data-v="${p.id}">${esc(p.name)}${myVote === p.id ? ' ✓' : ''}</button>`).join('') + `<button class="btn ${myVote === 'skip' ? 'warn' : 'secondary'}" data-v="skip">Воздержаться${myVote === 'skip' ? ' ✓' : ''}</button>`;
    }
    const votedCount = Object.keys(votes).length;
    h(`<div class="topbar"><span class="pill">🗳️ Голосование · ${esc(code)}</span></div>${body}
       <p class="hint">Проголосовало: ${votedCount}/${aliveIds.length}</p>

       <button class="btn secondary" id="o-leave">🚪 Выйти</button>`);
    if (!dead) document.querySelectorAll('[data-v]').forEach(b => b.addEventListener('click', () => { haptic(); DB.ref('rooms/' + code + '/state/votes/' + me).set(b.dataset.v); }));
    if (amHost) on('mf-tally', 'click', () => {
      haptic();
      const cnt = {}; Object.keys(votes).forEach(k => { const t = votes[k]; if (t && t !== 'skip') cnt[t] = (cnt[t] || 0) + 1; });
      let elim = null, max = 0, tie = false;
      Object.keys(cnt).forEach(t => { if (cnt[t] > max) { max = cnt[t]; elim = t; tie = false; } else if (cnt[t] === max) { tie = true; } });
      const nalive = Object.assign({}, alive); let log; let nroles = roles;
      if (!elim || tie) { log = '⚖️ Голоса разделились — никого не изгнали.'; }
      else { nalive[elim] = false; const r = roles[elim]; log = '⚖️ Изгнан: ' + nameIn(players, elim) + ' — роль: ' + r + ' ' + ((ROLE_INFO[r] || {}).emoji || ''); nroles = oMafiaPromote(roles, nalive); if (nroles !== roles) log += ' 🎖️ Сержант стал комиссаром.'; }
      const w = oMafiaWin(nroles, nalive);
      stateRef(code).update({ alive: nalive, roles: nroles, log, phase: w ? 'end' : 'night', day: s.day + (w ? 0 : 1), night: {}, winner: w || null });
    });
    on('o-leave', 'click', () => { haptic(); leaveRoom(code); });
    return;
  }

  if (s.phase === 'end') {
    const winner = s.winner;
    const titles = { mafia: 'Победила Мафия!', maniac: 'Победил Маньяк!', civilians: 'Победил Город!' };
    const emojis = { mafia: '🔪', maniac: '🪓', civilians: '🏆' };
    const roleRows = players.map(p => `<div class="scorerow"><span>${esc(p.name)} ${alive[p.id] ? '' : '💀'}</span><b>${esc(roles[p.id] || '')} ${((ROLE_INFO[roles[p.id]] || {}).emoji || '')}</b></div>`).join('');
    h(`<div class="topbar"><span class="pill">🔪 Итог · ${esc(code)}</span></div>
       <div class="reveal-box"><div style="font-size:52px">${emojis[winner] || '🏆'}</div><h2>${titles[winner] || 'Игра окончена'}</h2></div>
       <div class="card"><h3>Все роли</h3>${roleRows}</div>
       ${amHost ? '<button class="btn" id="mf-again">🔁 Новая игра</button>' : '<p class="hint center">Ждём ведущего…</p>'}
       <button class="btn secondary" id="o-leave">🚪 Выйти</button>`);
    if (amHost) on('mf-again', 'click', () => { haptic(); roomRef(code).update({ 'meta/status': 'lobby', state: null }); });
    on('o-leave', 'click', () => { haptic(); leaveRoom(code); });
    return;
  }
}

const COIN = '\uD83C\uDF1F'; // 🌟
const AD_ENABLED = false;     // реклама подключается позже (заглушка)
const BOT_USERNAME_DEFAULT = 'spyonirobot';

// ---------- каталоги ----------
const AVATARS = [

function avatarEm(id) { const a = AVATARS.find(x => x.id === id); return a ? a.em : '\uD83D\uDE42'; }
function titleObj(id) { return TITLES.find(x => x.id === id) || TITLES[0]; }

// ---------- идентификация ----------
function puser() { try { const u = tg && tg.initDataUnsafe && tg.initDataUnsafe.user; return (u && u.username) || ''; } catch (e) { return ''; } }

// ---------- уровни ----------
function xpNeed(level) { return 100 + (level - 1) * 60; }
function levelInfo(xp) {
  let lvl = 1, rem = xp || 0;
  while (rem >= xpNeed(lvl)) { rem -= xpNeed(lvl); lvl++; if (lvl > 999) break; }
  return { level: lvl, into: rem, need: xpNeed(lvl) };
}

// ---------- профиль (Firebase users/{pid}) ----------
let ME = null;
let CFG = { botUsername: BOT_USERNAME_DEFAULT };
function todayStr() { const d = new Date(); return d.getFullYear() + '-' + (d.getMonth() + 1) + '-' + d.getDate(); }
function defaultMe() {
  return {
    name: pname() || '\u0418\u0433\u0440\u043E\u043A', username: puser(),
    avatar: 'a_smile', title: 't_novice',
    xp: 0, level: 1, coins: 0, games: 0, wins: 0,
    refCount: 0, refBy: '', streak: 0, lastActive: '', purchased: false,
    owned: { a_smile: true, t_novice: true },
    daily: { date: '', play: 0, invited: 0, adWatched: false, claimed: {} },
    createdAt: Date.now()
  };
}
function applyDailyReset() {
  const t = todayStr();
  if (ME.lastActive !== t) {
    const y = new Date(Date.now() - 86400000);
    const ys = y.getFullYear() + '-' + (y.getMonth() + 1) + '-' + y.getDate();
    ME.streak = (ME.lastActive === ys) ? (ME.streak || 0) + 1 : 1;
    ME.lastActive = t;
  }
  if (!ME.daily || ME.daily.date !== t) ME.daily = { date: t, play: 0, invited: 0, adWatched: false, claimed: {} };
}
function persistMe() {
  if (!ME) return;
  ME.level = levelInfo(ME.xp).level;
  try { localStorage.setItem('gdag_me', JSON.stringify(ME)); } catch (e) {}
  if (fbReady()) { try { DB.ref('users/' + pid()).update(ME); } catch (e) {} }
}
function saveMe(patch) { if (!ME) return; Object.assign(ME, patch); persistMe(); }
function loadMe(cb) {
  if (!fbReady()) {
    try { ME = JSON.parse(localStorage.getItem('gdag_me')) || defaultMe(); } catch (e) { ME = defaultMe(); }
    ME = Object.assign(defaultMe(), ME); applyDailyReset(); if (cb) cb(); return;
  }
  DB.ref('users/' + pid()).once('value').then(s => {
    const v = s.val(); const isNew = !v;
    ME = Object.assign(defaultMe(), v || {});
    ME.owned = Object.assign({ a_smile: true, t_novice: true }, ME.owned || {});
    ME.daily = Object.assign({ date: '', play: 0, invited: 0, adWatched: false, claimed: {} }, ME.daily || {});
    ME.name = pname() || ME.name; ME.username = puser() || ME.username;
    applyDailyReset(); persistMe(); handleReferral(isNew);
    if (cb) cb();
  }).catch(() => { ME = defaultMe(); applyDailyReset(); if (cb) cb(); });
  try { DB.ref('config/bot/username').once('value').then(s => { if (s.val()) CFG.botUsername = s.val(); }); } catch (e) {}
}
function addPlay() {
  if (!ME) return;
  ME.games = (ME.games || 0) + 1;
  ME.xp = (ME.xp || 0) + 15;
  ME.daily = ME.daily || { date: todayStr(), play: 0, invited: 0, adWatched: false, claimed: {} };
  ME.daily.play = (ME.daily.play || 0) + 1;
  persistMe();
}
function addWin() { if (!ME) return; ME.wins = (ME.wins || 0) + 1; ME.xp = (ME.xp || 0) + 40; persistMe(); }

// ---------- рефералы ----------
function botUser() { return (CFG && CFG.botUsername) || BOT_USERNAME_DEFAULT; }
function referralLink() { return 'https://t.me/' + botUser() + '?startapp=ref' + pid(); }
function handleReferral(isNew) {
  if (!fbReady() || !ME) return;
  let sp = '';
  try { sp = (tg && tg.initDataUnsafe && tg.initDataUnsafe.start_param) || ''; } catch (e) {}
  if (!sp) { try { sp = new URLSearchParams(location.search).get('ref') || ''; } catch (e) {} }
  if (sp.indexOf('ref') === 0) sp = sp.slice(3);
  if (!sp) return;
  const refId = (sp.charAt(0) === 'u') ? sp : ('u' + sp);
  if (refId === pid() || ME.refBy || !isNew) return;
  ME.refBy = refId; saveMe({ refBy: refId });
  try {
    DB.ref('users/' + refId + '/coins').transaction(c => (c || 0) + 100);
    DB.ref('users/' + refId + '/refCount').transaction(c => (c || 0) + 1);
    DB.ref('users/' + refId + '/daily/invited').transaction(c => (c || 0) + 1);
  } catch (e) {}
}

function navBtn(t, ic, label) { return '<button data-tab="' + t + '"><span class="ic">' + ic + '</span><span>' + label + '</span></button>'; }
function ensureNav() {
  if (document.getElementById('gd-nav')) return;

// ---------- ежедневные задания (на Главной) ----------
function dailyTasks() {
  const d = (ME && ME.daily) || { play: 0, invited: 0, adWatched: false, claimed: {} };
  return [
    { id: 'login',  icon: '\uD83D\uDCC5', title: '\u0415\u0436\u0435\u0434\u043D\u0435\u0432\u043D\u044B\u0439 \u0432\u0445\u043E\u0434', goal: 1, reward: 50,  progress: 1 },
    { id: 'play3',  icon: '\uD83C\uDFAE', title: '\u0421\u044B\u0433\u0440\u0430\u0439 3 \u0438\u0433\u0440\u044B', goal: 3, reward: 150, progress: d.play || 0 },
    { id: 'invite', icon: '\uD83E\uDD1D', title: '\u041F\u0440\u0438\u0433\u043B\u0430\u0441\u0438 \u0434\u0440\u0443\u0433\u0430', goal: 1, reward: 100, progress: d.invited || 0 },
    { id: 'ad',     icon: '\uD83D\uDCFA', title: '\u041F\u043E\u0441\u043C\u043E\u0442\u0440\u0438 \u0440\u0435\u043A\u043B\u0430\u043C\u0443', goal: 1, reward: 80, progress: d.adWatched ? 1 : 0, soon: !AD_ENABLED }
  ];
}
function dailyHTML() {
  if (!ME) return '';
  const rows = dailyTasks().map(t => {
    const done = t.progress >= t.goal;
    const claimed = ME.daily.claimed && ME.daily.claimed[t.id];
    let btn;
    if (t.soon) btn = '<span class="hint">\u0421\u043A\u043E\u0440\u043E</span>';
    else if (claimed) btn = '<span class="hint">\u041F\u043E\u043B\u0443\u0447\u0435\u043D\u043E \u2713</span>';
    else if (done) btn = '<button class="btn success daily-claim" data-id="' + t.id + '" style="width:auto;margin:0;padding:8px 14px">\u041F\u043E\u043B\u0443\u0447\u0438\u0442\u044C</button>';
    else btn = '<span class="hint">' + Math.min(t.progress, t.goal) + '/' + t.goal + '</span>';
    return '<div class="optrow"><div class="optmain"><div class="opthd">' + t.icon + ' ' + t.title + '</div>' +
      '<div class="optsub">+' + t.reward + ' ' + COIN + '</div></div>' + btn + '</div>';
  }).join('');
  return '<div class="card"><h3>\u2705 \u0415\u0436\u0435\u0434\u043D\u0435\u0432\u043D\u044B\u0435 \u0437\u0430\u0434\u0430\u043D\u0438\u044F</h3>' + rows + '</div>';
}
function claimTask(id) {
  if (!ME) return;
  const t = dailyTasks().find(x => x.id === id); if (!t || t.soon) return;
  if (t.progress < t.goal) return;
  ME.daily.claimed = ME.daily.claimed || {};
  if (ME.daily.claimed[id]) return;
  ME.daily.claimed[id] = true;
  ME.coins = (ME.coins || 0) + t.reward;
  ME.xp = (ME.xp || 0) + Math.round(t.reward / 3);
  persistMe(); notify('success'); home();
}
function appendDaily() {
  if (!ME) return;
  const root = document.querySelector('#app .fade') || app;
  const div = document.createElement('div'); div.innerHTML = dailyHTML();
  root.appendChild(div);
  div.querySelectorAll('.daily-claim').forEach(b => b.addEventListener('click', () => { haptic(); claimTask(b.dataset.id); }));
}

  on('ref-share', 'click', () => {
    haptic();
    const url = 'https://t.me/share/url?url=' + encodeURIComponent(referralLink()) + '&text=' + encodeURIComponent('\u0417\u0430\u0445\u043E\u0434\u0438 \u0438\u0433\u0440\u0430\u0442\u044C \u0432 GameDAG!');
    try { if (tg && tg.openTelegramLink) tg.openTelegramLink(url); else window.open(url, '_blank'); } catch (e) {}
  });
  on('ref-copy', 'click', () => {
    haptic();
    try { navigator.clipboard.writeText(referralLink()); notify('success'); } catch (e) {}
    try { if (tg) tg.showPopup ? tg.showPopup({ message: '\u0421\u0441\u044B\u043B\u043A\u0430 \u0441\u043A\u043E\u043F\u0438\u0440\u043E\u0432\u0430\u043D\u0430' }) : null; } catch (e) {}
  });
}
function achievements() {
  const m = ME || {};
  return [
    { em: '\uD83E\uDD49', t: '\u041F\u043E\u0431\u0435\u0434\u044B: 1', done: (m.wins || 0) >= 1 },
    { em: '\uD83E\uDD48', t: '\u041F\u043E\u0431\u0435\u0434\u044B: 10', done: (m.wins || 0) >= 10 },
    { em: '\uD83D\uDC51', t: '\u041F\u043E\u0431\u0435\u0434\u044B: 50', done: (m.wins || 0) >= 50 },
    { em: '\uD83C\uDFAE', t: '\u0418\u0433\u0440\u044B: 25', done: (m.games || 0) >= 25 },
    { em: '\uD83D\uDD79\uFE0F', t: '\u0418\u0433\u0440\u044B: 100', done: (m.games || 0) >= 100 },
    { em: '\uD83D\uDD25', t: '\u0421\u0435\u0440\u0438\u044F: 7', done: (m.streak || 0) >= 7 },
    { em: '\uD83E\uDD1D', t: '\u0414\u0440\u0443\u0437\u0435\u0439: 5', done: (m.refCount || 0) >= 5 },
    { em: '\uD83C\uDF1F', t: '\u0414\u0440\u0443\u0437\u0435\u0439: 25', done: (m.refCount || 0) >= 25 },
    { em: '\uD83D\uDCFA', t: '\u0420\u0435\u043A\u043B\u0430\u043C\u0430', done: false },
    { em: '\uD83D\uDC8E', t: 'VIP', done: false },
    { em: '\uD83D\uDED2', t: '1-\u044F \u043F\u043E\u043A\u0443\u043F\u043A\u0430', done: !!m.purchased },
    { em: '\uD83D\uDCB0', t: '\u0411\u043E\u0433\u0430\u0447', done: (m.coins || 0) >= 27000 }
  ];
}

// ---------- МАГАЗИН ----------
function screenShop() {
  ensureNav(); setActiveTab('shop'); setBack(home);
  if (!ME) { loadMe(() => screenShop()); return; }
  loadStarPacks(packs => renderShop(packs));
}
function loadStarPacks(cb) {
  if (!fbReady()) return cb(null);
  DB.ref('config/starPacks').once('value').then(s => cb(s.val())).catch(() => cb(null));
}
function renderShop(packs) {
  const packArr = packs ? Object.keys(packs).map(k => Object.assign({ _id: k }, packs[k])).sort((a, b) => a.stars - b.stars) : [];
  const packHTML = packArr.length
    ? packArr.map(p => '<button class="btn warn buy-stars" data-id="' + p._id + '" style="display:flex;justify-content:space-between;align-items:center"><span>' + p.coins + ' ' + COIN + '</span><span>\u2B50 ' + p.stars + '</span></button>').join('')
    : '<p class="hint">\u041F\u043E\u043A\u0443\u043F\u043A\u0430 \u0437\u0430 \u0437\u0432\u0451\u0437\u0434\u044B \u0441\u043A\u043E\u0440\u043E \u0431\u0443\u0434\u0435\u0442 \u0434\u043E\u0441\u0442\u0443\u043F\u043D\u0430.</p>';
  const avHTML = AVATARS.map(a => {
    const owned = ME.owned[a.id]; const eq = ME.avatar === a.id;
    const foot = eq ? '<div class="hint">\u2713 \u043D\u0430\u0434\u0435\u0442</div>' : owned ? '<button class="btn secondary equip-av" data-id="' + a.id + '" style="padding:5px;margin:6px 0 0;font-size:13px">\u041D\u0430\u0434\u0435\u0442\u044C</button>' : '<button class="btn buy-av" data-id="' + a.id + '" style="padding:5px;margin:6px 0 0;font-size:13px">' + a.price + ' ' + COIN + '</button>';
    return '<div class="shop-item"><div class="em">' + a.em + '</div>' + foot + '</div>';
  }).join('');
  const ttHTML = TITLES.map(t => {
    const owned = ME.owned[t.id]; const eq = ME.title === t.id;
    const btn = eq ? '<span class="hint">\u2713 \u043D\u0430\u0434\u0435\u0442</span>' : owned ? '<button class="btn secondary equip-tt" data-id="' + t.id + '" style="width:auto;margin:0;padding:7px 12px;font-size:13px">\u041D\u0430\u0434\u0435\u0442\u044C</button>' : '<button class="btn buy-tt" data-id="' + t.id + '" style="width:auto;margin:0;padding:7px 12px;font-size:13px">' + t.price + ' ' + COIN + '</button>';
    return '<div class="optrow"><span class="title-chip" style="background:' + t.color + '22;color:' + t.color + '">' + esc(t.name) + '</span>' + btn + '</div>';
  }).join('');
  h(
    '<div class="topbar"><span class="pill">\uD83D\uDC8E \u041C\u0430\u0433\u0430\u0437\u0438\u043D</span><span class="spacer" style="flex:1"></span><span class="coinbadge">' + (ME.coins || 0) + ' ' + COIN + '</span></div>' +
    '<div class="card"><h3>\u2B50 \u041A\u0443\u043F\u0438\u0442\u044C \u0437\u0432\u0451\u0437\u0434\u043E\u0447\u043A\u0438</h3><p class="hint">\u041E\u043F\u043B\u0430\u0442\u0430 \u0437\u0432\u0451\u0437\u0434\u0430\u043C\u0438 Telegram \u2014 \u043C\u0433\u043D\u043E\u0432\u0435\u043D\u043D\u043E.</p>' + packHTML + '</div>' +
    '<div class="card"><h3>\uD83D\uDCFA \u0411\u0435\u0441\u043F\u043B\u0430\u0442\u043D\u044B\u0435 \u0437\u0432\u0451\u0437\u0434\u043E\u0447\u043A\u0438</h3><button class="btn success" id="watch-ad">\uD83C\uDFAC \u0421\u043C\u043E\u0442\u0440\u0435\u0442\u044C \u0440\u0435\u043A\u043B\u0430\u043C\u0443 (+80 ' + COIN + ')</button></div>' +
    '<div class="prof-card"><h3>\uD83C\uDFAD \u0410\u0432\u0430\u0442\u0430\u0440\u044B</h3><div class="shop-grid">' + avHTML + '</div></div>' +
    '<div class="prof-card"><h3>\uD83C\uDFF7\uFE0F \u0422\u0438\u0442\u0443\u043B\u044B</h3>' + ttHTML + '</div>'
  );
  document.querySelectorAll('.buy-stars').forEach(b => b.addEventListener('click', () => { haptic(); buyStars(packs[b.dataset.id]); }));
  document.querySelectorAll('.buy-av').forEach(b => b.addEventListener('click', () => { haptic(); buyItem('avatar', AVATARS.find(a => a.id === b.dataset.id)); }));
  document.querySelectorAll('.equip-av').forEach(b => b.addEventListener('click', () => { haptic(); equip('avatar', b.dataset.id); screenShop(); }));
  document.querySelectorAll('.buy-tt').forEach(b => b.addEventListener('click', () => { haptic(); buyItem('title', TITLES.find(t => t.id === b.dataset.id)); }));
  document.querySelectorAll('.equip-tt').forEach(b => b.addEventListener('click', () => { haptic(); equip('title', b.dataset.id); screenShop(); }));
  on('watch-ad', 'click', () => { haptic(); watchAd(); });
}
function buyItem(kind, item) {
  if (!ME || !item) return;
  if (ME.owned[item.id]) { equip(kind, item.id); screenShop(); return; }
  if ((ME.coins || 0) < item.price) { try { tg && tg.showPopup ? tg.showPopup({ message: '\u041D\u0435\u0434\u043E\u0441\u0442\u0430\u0442\u043E\u0447\u043D\u043E \u0437\u0432\u0451\u0437\u0434\u043E\u0447\u0435\u043A' }) : alert('\u041D\u0435\u0434\u043E\u0441\u0442\u0430\u0442\u043E\u0447\u043D\u043E \u0437\u0432\u0451\u0437\u0434\u043E\u0447\u0435\u043A'); } catch (e) {} notify('warning'); return; }
  ME.coins -= item.price; ME.owned[item.id] = true;
  if (kind === 'avatar') ME.avatar = item.id; else ME.title = item.id;
  persistMe(); notify('success'); screenShop();
}
function equip(kind, id) {
  if (!ME || !ME.owned[id]) return;
  if (kind === 'avatar') ME.avatar = id; else ME.title = id;
  persistMe();
}
function buyStars(pack) {
  if (!pack || !pack.link) { alert('\u041F\u043E\u043A\u0443\u043F\u043A\u0430 \u0437\u0432\u0451\u0437\u0434 \u0441\u043A\u043E\u0440\u043E \u0431\u0443\u0434\u0435\u0442 \u0434\u043E\u0441\u0442\u0443\u043F\u043D\u0430'); return; }
  if (!(tg && tg.openInvoice)) { alert('\u041E\u0431\u043D\u043E\u0432\u0438\u0442\u0435 Telegram, \u0447\u0442\u043E\u0431\u044B \u043F\u043B\u0430\u0442\u0438\u0442\u044C \u0437\u0432\u0451\u0437\u0434\u0430\u043C\u0438'); return; }
  try {
    tg.openInvoice(pack.link, st => {
      if (st === 'paid') { notify('success'); setTimeout(() => loadMe(() => screenShop()), 1500); }
    });
  } catch (e) { alert('\u041D\u0435 \u0443\u0434\u0430\u043B\u043E\u0441\u044C \u043E\u0442\u043A\u0440\u044B\u0442\u044C \u043E\u043F\u043B\u0430\u0442\u0443'); }
}
function watchAd() {
  if (!AD_ENABLED) { alert('\uD83D\uDCFA \u0420\u0435\u043A\u043B\u0430\u043C\u0430 \u0441\u043A\u043E\u0440\u043E \u0431\u0443\u0434\u0435\u0442 \u0434\u043E\u0441\u0442\u0443\u043F\u043D\u0430 \u2014 \u0441\u043B\u0435\u0434\u0438 \u0437\u0430 \u043E\u0431\u043D\u043E\u0432\u043B\u0435\u043D\u0438\u044F\u043C\u0438!'); return; }
  // здесь позже будет вызов рекламной сети (Adsgram и т.п.)
}

// ---------- интеграция с меню (Главная + учёт игр) ----------
var _homeBase = home;
home = function () {
  if (typeof _homeBase === 'function') _homeBase();
  ensureNav(); setActiveTab('home');
  try { appendDaily(); } catch (e) {}
};
['spySetup', 'mafiaSetup', 'crocSetup', 'todSetup'].forEach(function (fn) {
  try {
    var orig = eval(fn);
    if (typeof orig === 'function') {
      eval(fn + ' = function(){ try{ addPlay(); }catch(e){} return orig.apply(this, arguments); };');
    }
  } catch (e) {}
});

// ---------- запуск ----------
(function () {
  try {
    ensureNav();
    loadMe(function () { try { home(); } catch (e) {} });
  } catch (e) { try { home(); } catch (_) {} }
})();

</script>
