<style>
:root {
  --bg: var(--tg-theme-bg-color, #17212b);
  --secbg: var(--tg-theme-secondary-bg-color, #232e3c);
  --text: var(--tg-theme-text-color, #ffffff);
  --hint: var(--tg-theme-hint-color, #7d8b99);
  --link: var(--tg-theme-link-color, #64baf0);
  --btn: var(--tg-theme-button-color, #3390ec);
  --btntext: var(--tg-theme-button-text-color, #ffffff);
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  font-size: 16px;
  line-height: 1.4;
  overscroll-behavior: none;
}
#app { max-width: 560px; margin: 0 auto; padding: 16px 16px 40px; min-height: 100%; }
h1 { font-size: 26px; margin: 4px 0 2px; }
h2 { font-size: 21px; margin: 8px 0 12px; }
h3 { font-size: 17px; margin: 0 0 8px; }
p { margin: 8px 0; }
.hint { color: var(--hint); font-size: 14px; }
.center { text-align: center; }
.spacer { height: 12px; }
.big { font-size: 28px; font-weight: 700; }
.huge { font-size: 34px; font-weight: 800; margin: 14px 0; }

.card {
  background: var(--secbg);
  border-radius: 16px;
  padding: 16px;
  margin: 10px 0;
}
.menu-item {
  display: flex; align-items: center; gap: 14px;
  background: var(--secbg);
  border-radius: 16px; padding: 16px; margin: 10px 0;
  cursor: pointer; border: none; width: 100%; text-align: left;
  color: var(--text); transition: transform .08s ease, opacity .08s;
}
.menu-item:active { transform: scale(0.98); opacity: .85; }
.menu-item .emoji { font-size: 32px; line-height: 1; }
.menu-item .ttl { font-size: 18px; font-weight: 700; }
.menu-item .sub { font-size: 13px; color: var(--hint); margin-top: 2px; }

button.btn {
  display: block; width: 100%; border: none; cursor: pointer;
  background: var(--btn); color: var(--btntext);
  font-size: 17px; font-weight: 600; padding: 15px; border-radius: 14px;
  margin: 10px 0; transition: transform .08s ease, opacity .08s;
}
button.btn:active { transform: scale(0.98); opacity: .9; }
button.btn.secondary { background: var(--secbg); color: var(--text); }
button.btn.success { background: #4caf50; color: #fff; }
button.btn.danger { background: #e0533d; color: #fff; }
button.btn.warn { background: #e0a13d; color: #fff; }
button.btn:disabled { opacity: .4; cursor: default; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(64px, 1fr)); gap: 8px; }
.chip {
  border: none; cursor: pointer; background: var(--secbg); color: var(--text);
  border-radius: 12px; padding: 14px 8px; font-size: 18px; font-weight: 700;
  transition: transform .08s;
}
.chip:active { transform: scale(0.95); }
.chip.active { background: var(--btn); color: var(--btntext); }

.list-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 14px; background: var(--secbg); border-radius: 12px; margin: 6px 0;
}
.role-badge { font-size: 22px; font-weight: 800; }
.reveal-box {
  background: var(--secbg); border-radius: 20px; padding: 28px 18px; text-align: center;
  margin: 16px 0;
}
.pill { display:inline-block; padding: 4px 12px; border-radius: 999px; background: var(--btn); color: var(--btntext); font-size: 13px; font-weight: 600; }
.topbar { display:flex; align-items:center; gap:10px; margin-bottom: 6px; }
.fade { animation: fade .25s ease; }
@keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
.scorerow { display:flex; justify-content:space-between; padding:10px 4px; border-bottom:1px solid rgba(255,255,255,.08); }
.input-num { width:100%; font-size:22px; text-align:center; padding:12px; border-radius:12px; border:none; background:var(--secbg); color:var(--text); }

.input{width:100%;font-size:18px;padding:14px;border-radius:12px;border:none;background:var(--secbg);color:var(--text);margin:8px 0;}

</style>
</head>

if (tg) { try { tg.ready(); tg.expand(); } catch (e) {} }
const D = window.GAME_DATA;
const app = document.getElementById('app');

// ---------- helpers ----------
function h(html) { app.innerHTML = '<div class="fade">' + html + '</div>'; window.scrollTo(0, 0); }
function el(id) { return document.getElementById(id); }
function on(id, ev, fn) { const e = el(id); if (e) e.addEventListener(ev, fn); }
function esc(s) { return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function haptic(type) { try { if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred(type || 'light'); } catch (e) {} }
function notify(type) { try { if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred(type || 'success'); } catch (e) {} }
function shuffle(a) { a = a.slice(); for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }
function rand(a) { return a[Math.floor(Math.random() * a.length)]; }
function range(n) { return Array.from({ length: n }, (_, i) => i); }

let backStack = [];
function setBack(fn) {
  if (!tg || !tg.BackButton) return;
  if (fn) { tg.BackButton.show(); tg.BackButton.onClick(handleBack); backStack._fn = fn; }
  else { tg.BackButton.hide(); }
}
function handleBack() { if (backStack._fn) backStack._fn(); }

// reusable player-count picker
function countPicker(opts) {
  // opts: {title, sub, min, max, value, onPick}
  const { title, sub, min, max } = opts;
  let val = opts.value || min;
  const chips = range(max - min + 1).map(i => {
    const n = min + i;
    return `<button class="chip" data-n="${n}">${n}</button>`;
  }).join('');
  h(`
    <div class="topbar"><span class="pill">${esc(title)}</span></div>
    <h2>Сколько игроков?</h2>
    <p class="hint">${esc(sub || '')}</p>

    <button class="btn" id="cp-go">Продолжить</button>
    <button class="btn secondary" id="cp-back">← Назад в меню</button>
  `);
  function mark() { document.querySelectorAll('#cp-grid .chip').forEach(c => c.classList.toggle('active', +c.dataset.n === val)); }
  document.querySelectorAll('#cp-grid .chip').forEach(c => c.addEventListener('click', () => { val = +c.dataset.n; haptic(); mark(); }));
  mark();
  on('cp-go', 'click', () => { haptic(); opts.onPick(val); });
  on('cp-back', 'click', () => { haptic(); home(); });
  setBack(home);
}

let mafia = {};
function mafiaSetup() {
  countPicker({
    title: '🔪 МАФИЯ', sub: 'От 4 до 10 игроков. 5+ — комиссар, 6+ — доктор, 7+ — 2 мафии.', min: 4, max: 10, value: 5,
    onPick(n) { mafiaAssign(n); }
  });
}
function mafiaAssign(n) {
  const ids = range(n);
  const roles = {};
  let pool = shuffle(ids);
  const mafiaCount = n >= 7 ? 2 : 1;
  const mafiaIds = pool.slice(0, mafiaCount); pool = pool.slice(mafiaCount);
  mafiaIds.forEach(i => roles[i] = 'мафия');
  let komissar = null, doctor = null;
  if (n >= 5 && pool.length) { komissar = pool.shift(); roles[komissar] = 'комиссар'; }
  if (n >= 6 && pool.length) { doctor = pool.shift(); roles[doctor] = 'доктор'; }
  pool.forEach(i => roles[i] = 'мирный');
  mafia = {
    count: n, roles, mafiaIds, komissar, doctor,
    alive: ids.reduce((o, i) => (o[i] = true, o), {}),
    day: 1, cur: 0
  };
  mafiaReveal();
}
const ROLE_INFO = {
  'мафия':   { emoji: '🔪', text: 'Ночью вы убиваете мирных. Не выдайте себя днём.' },
  'комиссар':{ emoji: '🕵️', text: 'Ночью вы проверяете одного игрока — мафия он или нет.' },
  'доктор':  { emoji: '💊', text: 'Ночью вы спасаете одного игрока от убийства.' },
  'мирный':  { emoji: '👤', text: 'Днём вычисляйте мафию и голосуйте против неё.' }
};
function mafiaReveal() {
  const i = mafia.cur;
  if (i >= mafia.count) return mafiaNightStart();
  passDevice('Игрок ' + (i + 1), 'Узнать мою роль', () => {
    const role = mafia.roles[i];
    const info = ROLE_INFO[role];
    let extra = '';
    if (role === 'мафия' && mafia.mafiaIds.length > 1) {
      const others = mafia.mafiaIds.filter(x => x !== i).map(x => 'Игрок ' + (x + 1)).join(', ');
      extra = `<p class="hint">Ваши напарники: ${esc(others)}</p>`;
    }
    h(`<div class="reveal-box">
        <div style="font-size:52px">${info.emoji}</div>
        <h2>${esc(role.toUpperCase())}</h2>
        <p>${info.text}</p>${extra}
      </div>
      <button class="btn" id="mf-next">Скрыть и передать дальше</button>`);
    on('mf-next', 'click', () => { haptic(); mafia.cur++; mafiaReveal(); });
  });
}
function aliveList(excludeSelf) {
  return range(mafia.count).filter(i => mafia.alive[i] && i !== excludeSelf);
}
function targetButtons(targets, prefix) {
  return targets.map(i => `<button class="btn secondary" data-t="${i}" id="${prefix}-${i}">Игрок ${i + 1}</button>`).join('');
}
function mafiaNightStart() {
  mafia.night = {};
  setBack(null);
  h(`<div class="reveal-box"><div style="font-size:52px">🌙</div><h2>Ночь ${mafia.day}</h2><p>Город засыпает…</p></div>
     <button class="btn" id="mf-go">Начать ночь</button>`);

function mafiaMafiaTurn() {
  passDevice('Мафия 🔪', 'Открыть глаза', () => {
    const targets = range(mafia.count).filter(i => mafia.alive[i] && !mafia.mafiaIds.includes(i));

    targets.forEach(i => on('mk-' + i, 'click', () => { haptic('medium'); mafia.night.victim = i; mafiaDoctorTurn(); }));
  });
}
function mafiaDoctorTurn() {
  if (mafia.doctor === null || !mafia.alive[mafia.doctor]) return mafiaKomissarTurn();
  passDevice('Доктор 💊', 'Открыть глаза', () => {
    const targets = range(mafia.count).filter(i => mafia.alive[i]);
    h(`<h2>💊 Доктор спасает</h2><p class="hint">Кого вылечить этой ночью?</p>${targetButtons(targets, 'mh')}`);
    targets.forEach(i => on('mh-' + i, 'click', () => { haptic('medium'); mafia.night.heal = i; mafiaKomissarTurn(); }));
  });
}
function mafiaKomissarTurn() {
  if (mafia.komissar === null || !mafia.alive[mafia.komissar]) return mafiaResolveNight();
  passDevice('Комиссар 🕵️', 'Открыть глаза', () => {
    const targets = aliveList(mafia.komissar);
    h(`<h2>🕵️ Комиссар проверяет</h2><p class="hint">Кого проверить?</p>${targetButtons(targets, 'mc')}`);
    targets.forEach(i => on('mc-' + i, 'click', () => {
      haptic('medium');
      const isMafia = mafia.mafiaIds.includes(i);
      h(`<div class="reveal-box"><div style="font-size:48px">${isMafia ? '🔪' : '✅'}</div>

         <button class="btn" id="mc-ok">Закрыть глаза</button>`);
      on('mc-ok', 'click', () => { haptic(); mafiaResolveNight(); });
    }));
  });
}
function mafiaResolveNight() {
  const v = mafia.night.victim, hl = mafia.night.heal;
  let killedMsg;
  if (v != null && v !== hl) { mafia.alive[v] = false; killedMsg = `☠️ Этой ночью убит <b>Игрок ${v + 1}</b>.`; }
  else if (v != null && v === hl) { killedMsg = '💊 Доктор спас жертву! Все живы.'; }
  else { killedMsg = 'Этой ночью никто не погиб.'; }
  passDevice('Все 🌅', 'Показать итоги ночи', () => {
    h(`<div class="reveal-box"><div style="font-size:48px">🌅</div><h2>Утро ${mafia.day}</h2><p class="big">${killedMsg}</p></div>
       <button class="btn" id="mf-cont">Продолжить</button>`);
    on('mf-cont', 'click', () => { haptic(); const w = mafiaCheckWin(); if (w) return mafiaEnd(w); mafiaDay(); });
  });
}
function mafiaCheckWin() {
  const aliveMafia = mafia.mafiaIds.filter(i => mafia.alive[i]).length;
  const aliveCiv = range(mafia.count).filter(i => mafia.alive[i] && !mafia.mafiaIds.includes(i)).length;
  if (aliveMafia === 0) return 'civilians';
  if (aliveMafia >= aliveCiv) return 'mafia';
  return null;
}
function mafiaDay() {
  setBack(null);
  const aliveP = range(mafia.count).filter(i => mafia.alive[i]);
  const rows = aliveP.map(i => `Игрок ${i + 1}`).join(', ');
  h(`<div class="topbar"><span class="pill">☀️ День ${mafia.day}</span></div>
     <div class="card"><h3>Живые игроки</h3><p>${rows}</p></div>
     <p class="hint">Обсудите, кто мафия. Затем начните голосование — каждый живой игрок голосует по очереди на этом устройстве.</p>
     <button class="btn warn" id="mf-vote">🗳️ Начать голосование</button>`);
  on('mf-vote', 'click', () => { haptic(); mafia.votes = {}; mafia.voteOrder = aliveP.slice(); mafia.voteIdx = 0; mafiaVoteStep(); });
}
function mafiaVoteStep() {
  if (mafia.voteIdx >= mafia.voteOrder.length) return mafiaVoteResult();
  const voter = mafia.voteOrder[mafia.voteIdx];
  passDevice('Игрок ' + (voter + 1) + ' голосует', 'Голосовать', () => {
    const targets = aliveList(voter);
    h(`<h2>🗳️ За кого голосует Игрок ${voter + 1}?</h2>
       ${targetButtons(targets, 'mv')}
       <button class="btn secondary" id="mv-skip">Воздержаться</button>`);
    targets.forEach(i => on('mv-' + i, 'click', () => { haptic(); mafia.votes[i] = (mafia.votes[i] || 0) + 1; mafia.voteIdx++; mafiaVoteStep(); }));
    on('mv-skip', 'click', () => { haptic(); mafia.voteIdx++; mafiaVoteStep(); });
  });
}
function mafiaVoteResult() {
  const entries = Object.entries(mafia.votes);
  let out = '', eliminated = null;
  if (!entries.length) { out = 'Никто не проголосовал — день прошёл спокойно.'; }
  else {
    const max = Math.max(...entries.map(e => e[1]));
    const top = entries.filter(e => e[1] === max).map(e => +e[0]);
    if (top.length > 1) { out = 'Голоса разделились поровну — никого не выгнали.'; }
    else {
      eliminated = top[0]; mafia.alive[eliminated] = false;
      const role = mafia.roles[eliminated];
      out = `Город изгнал <b>Игрока ${eliminated + 1}</b>. Его роль: <b>${esc(role)}</b> ${ROLE_INFO[role].emoji}`;
    }
  }
  h(`<div class="reveal-box"><div style="font-size:48px">⚖️</div><h2>Итог голосования</h2><p class="big">${out}</p></div>
     <button class="btn" id="mf-cont">Продолжить</button>`);
  on('mf-cont', 'click', () => {
    haptic();
    const w = mafiaCheckWin(); if (w) return mafiaEnd(w);
    mafia.day++; mafiaNightStart();
  });
}
function mafiaEnd(winner) {
  notify('success');
  setBack(home);
  const roleRows = range(mafia.count).map(i =>
    `<div class="scorerow"><span>Игрок ${i + 1} ${mafia.alive[i] ? '' : '💀'}</span><b>${esc(mafia.roles[i])} ${ROLE_INFO[mafia.roles[i]].emoji}</b></div>`).join('');
  h(`<div class="reveal-box"><div style="font-size:52px">${winner === 'mafia' ? '🔪' : '🏆'}</div>
      <h2>${winner === 'mafia' ? 'Победила Мафия!' : 'Победил Город!'}</h2></div>
     <div class="card"><h3>Все роли</h3>${roleRows}</div>
     <button class="btn" id="mf-again">🔁 Сыграть ещё</button>
     <button class="btn secondary" id="mf-home">🏠 В меню</button>`);
  on('mf-again', 'click', () => { haptic(); mafiaSetup(); });
  on('mf-home', 'click', () => { haptic(); home(); });
}

function routeStart() {
  // Бот может открыть конкретную игру через ?game=... в URL
  let g = '';
  try { g = new URLSearchParams(location.search).get('game') || ''; } catch (e) {}
  // или через start_param (startapp=...) в Telegram
  try { if (!g && tg && tg.initDataUnsafe && tg.initDataUnsafe.start_param) g = tg.initDataUnsafe.start_param; } catch (e) {}
  switch (g) {
    case 'spy': return spySetup();
    case 'mafia': return mafiaSetup();
    case 'crocodile': case 'croc': return crocSetup();
    case 'tod': return todSetup();
    default: return home();
  }
}
routeStart();

// ---------- helpers ----------
function genCode() { const A = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; let c = ''; for (let i = 0; i < 4; i++) c += A[Math.floor(Math.random() * A.length)]; return c; }
function playersArr(room) {

  return Object.keys(pl).map(id => ({ id, name: pl[id].name || '\u0418\u0433\u0440\u043E\u043A', online: pl[id].online, joinedAt: pl[id].joinedAt || 0 }))
    .sort((a, b) => a.joinedAt - b.joinedAt);
}
function isHost(room) { return !!(room && room.meta && room.meta.hostId === pid()); }
function nameIn(players, id) { const p = players.find(x => x.id === id); return p ? p.name : '\u2014'; }
function gameTitle(g) { return ({ spy: '\uD83D\uDD75\uFE0F \u0428\u043F\u0438\u043E\u043D', mafia: '\uD83D\uDD2A \u041C\u0430\u0444\u0438\u044F', croc: '\uD83D\uDC0A \u041A\u0440\u043E\u043A\u043E\u0434\u0438\u043B', tod: '\uD83C\uDFAD \u041F\u0440\u0430\u0432\u0434\u0430/\u0414\u0435\u0439\u0441\u0442\u0432\u0438\u0435' })[g] || g; }
function stateRef(code) { return DB.ref('rooms/' + code + '/state'); }
function roomRef(code) { return DB.ref('rooms/' + code); }

// ---------- room subscription ----------
let RoomSub = { code: null, ref: null, handler: null };
function detachRoom() {
  if (RoomSub.ref && RoomSub.handler) { try { RoomSub.ref.off('value', RoomSub.handler); } catch (e) {} }
  RoomSub = { code: null, ref: null, handler: null };
}
function setupPresence(code) {
  try {
    const r = DB.ref('rooms/' + code + '/players/' + pid() + '/online');
    r.onDisconnect().set(false);
    r.set(true);
  } catch (e) {}
}
function watchRoom(code) {
  detachRoom();
  const ref = roomRef(code);
  const handler = ref.on('value', snap => {
    const room = snap.val();
    if (!room || !room.meta) { detachRoom(); alert('\u041A\u043E\u043C\u043D\u0430\u0442\u0430 \u0437\u0430\u043A\u0440\u044B\u0442\u0430'); home(); return; }
    renderRoom(code, room);
  });
  RoomSub = { code, ref, handler };
}
function leaveRoom(code) {
  detachRoom();
  try { DB.ref('rooms/' + code + '/players/' + pid()).remove(); } catch (e) {}
  home();
}

function createRoom(game) {
  const code = genCode();
  const now = Date.now();
  roomRef(code).set({
    meta: { game, hostId: pid(), status: 'lobby', createdAt: now },
    players: { [pid()]: { name: pname(), online: true, joinedAt: now } }
  }).then(() => { setupPresence(code); watchRoom(code); })
    .catch(() => alert('\u041D\u0435 \u0443\u0434\u0430\u043B\u043E\u0441\u044C \u0441\u043E\u0437\u0434\u0430\u0442\u044C \u043A\u043E\u043C\u043D\u0430\u0442\u0443'));
}
function joinRoom(code) {
  roomRef(code).once('value').then(snap => {
    const room = snap.val();
    if (!room || !room.meta) { alert('\u041A\u043E\u043C\u043D\u0430\u0442\u0430 \u043D\u0435 \u043D\u0430\u0439\u0434\u0435\u043D\u0430'); return; }
    const now = Date.now();
    DB.ref('rooms/' + code + '/players/' + pid()).set({ name: pname(), online: true, joinedAt: now })
      .then(() => { setupPresence(code); watchRoom(code); });
  }).catch(() => alert('\u041E\u0448\u0438\u0431\u043A\u0430 \u043F\u043E\u0434\u043A\u043B\u044E\u0447\u0435\u043D\u0438\u044F'));
}

// ---------- render dispatch ----------
function renderRoom(code, room) {
  if (room.meta.status === 'lobby') return lobbyView(code, room);
  const g = room.meta.game;
  if (g === 'spy') return renderSpy(code, room);
  if (g === 'croc') return renderCroc(code, room);
  if (g === 'tod') return renderTod(code, room);
  if (g === 'mafia') return renderMafia(code, room);
}

// ====================== SPY ONLINE ======================
function oSpyStart(code, room) {
  const ids = playersArr(room).map(p => p.id);
  if (ids.length < 3) { alert('\u041D\u0443\u0436\u043D\u043E \u043C\u0438\u043D\u0438\u043C\u0443\u043C 3 \u0438\u0433\u0440\u043E\u043A\u0430'); return; }
  let theme = room.meta.opt || '__rand__';
  const themes = Object.keys(D.THEMES);
  if (theme === '__rand__' || !D.THEMES[theme]) theme = rand(themes);
  const spyId = rand(ids);
  const word = rand(D.THEMES[theme]);
  roomRef(code).update({ 'meta/status': 'playing', state: { phase: 'reveal', theme, word, spyId, votes: {} } });
}
function renderSpy(code, room) {
  const me = pid(); const s = room.state || {}; const players = playersArr(room); const amHost = isHost(room);
  if (s.phase === 'reveal') {
    const isSpy = s.spyId === me;

function oMafiaWin(roles, alive) {
  let m = 0, o = 0;
  Object.keys(alive).forEach(id => { if (alive[id]) { if (roles[id] === '\u043C\u0430\u0444\u0438\u044F') m++; else o++; } });
  if (m === 0) return 'civilians';
  if (m >= o) return 'mafia';
  return null;
}
function oMafiaStart(code, room) {
  const ids = playersArr(room).map(p => p.id); const n = ids.length;
  if (n < 4) { alert('\u041D\u0443\u0436\u043D\u043E \u043C\u0438\u043D\u0438\u043C\u0443\u043C 4 \u0438\u0433\u0440\u043E\u043A\u0430'); return; }
  const sh = shuffle(ids); const roles = {}; let i = 0;
  const mafiaCount = n >= 7 ? 2 : 1;
  for (let k = 0; k < mafiaCount; k++) roles[sh[i++]] = '\u043C\u0430\u0444\u0438\u044F';
  if (n >= 5) roles[sh[i++]] = '\u043A\u043E\u043C\u0438\u0441\u0441\u0430\u0440';
  if (n >= 6) roles[sh[i++]] = '\u0434\u043E\u043A\u0442\u043E\u0440';
  while (i < sh.length) roles[sh[i++]] = '\u043C\u0438\u0440\u043D\u044B\u0439';
  const alive = {}; ids.forEach(id => alive[id] = true);
  roomRef(code).update({ 'meta/status': 'playing', state: { phase: 'role', roles, alive, day: 1, night: {}, votes: {}, log: '' } });
}

      const targets = players.filter(p => alive[p.id] && p.id !== me);
      body = '<h2>\uD83D\uDD75\uFE0F \u041A\u043E\u0433\u043E \u043F\u0440\u043E\u0432\u0435\u0440\u0438\u0442\u044C?</h2>' + targets.map(p => `<button class="btn ${night.check === p.id ? 'warn' : 'secondary'}" data-t="${p.id}">${esc(p.name)}${night.check === p.id ? ' \u2713' : ''}</button>`).join('');
      if (night.check) { const isMaf = roles[night.check] === '\u043C\u0430\u0444\u0438\u044F'; body += `<div class="card center"><b>${esc(nameIn(players, night.check))}</b>: ${isMaf ? '\uD83D\uDD2A \u041C\u0410\u0424\u0418\u042F' : '\u2705 \u043D\u0435 \u043C\u0430\u0444\u0438\u044F'}</div>`; }
      wireField = 'check';
    } else {
      body = '<div class="reveal-box"><div style="font-size:48px">\uD83C\uDF19</div><h2>\u0413\u043E\u0440\u043E\u0434 \u0441\u043F\u0438\u0442\u2026</h2><p class="hint">\u0416\u0434\u0451\u043C \u0434\u0435\u0439\u0441\u0442\u0432\u0438\u0439 \u043D\u043E\u0447\u043D\u044B\u0445 \u0440\u043E\u043B\u0435\u0439.</p></div>';
    }
    const hostBtn = amHost ? (night.victim ? '<button class="btn" id="mf-resolve">\u2600\uFE0F \u0417\u0430\u0432\u0435\u0440\u0448\u0438\u0442\u044C \u043D\u043E\u0447\u044C</button>' : '<p class="hint center">\u0416\u0434\u0451\u043C, \u043F\u043E\u043A\u0430 \u043C\u0430\u0444\u0438\u044F \u0432\u044B\u0431\u0435\u0440\u0435\u0442 \u0436\u0435\u0440\u0442\u0432\u0443\u2026</p>') : '';
    h(`<div class="topbar"><span class="pill">\uD83C\uDF19 \u041D\u043E\u0447\u044C ${s.day} \u00B7 ${esc(code)}</span></div>${banner}${body}${hostBtn}<button class="btn secondary" id="o-leave">\uD83D\uDEAA \u0412\u044B\u0439\u0442\u0438</button>`);
    if (wireField) document.querySelectorAll('[data-t]').forEach(b => b.addEventListener('click', () => { haptic('medium'); DB.ref('rooms/' + code + '/state/night/' + wireField).set(b.dataset.t); }));
    if (amHost && night.victim) on('mf-resolve', 'click', () => {
      haptic();
      const v = night.victim, hl = night.heal;
      const nalive = Object.assign({}, alive); let log;
      if (v && v !== hl) { nalive[v] = false; log = '\u2620\uFE0F \u041D\u043E\u0447\u044C\u044E \u0443\u0431\u0438\u0442: ' + nameIn(players, v); }
      else if (v && v === hl) { log = '\uD83D\uDC8A \u0414\u043E\u043A\u0442\u043E\u0440 \u0441\u043F\u0430\u0441 \u0436\u0435\u0440\u0442\u0432\u0443 \u2014 \u0432\u0441\u0435 \u0436\u0438\u0432\u044B.'; }
      else { log = '\u041D\u043E\u0447\u044C\u044E \u043D\u0438\u043A\u0442\u043E \u043D\u0435 \u043F\u043E\u0433\u0438\u0431.'; }
      const w = oMafiaWin(roles, nalive);
      stateRef(code).update({ alive: nalive, log, phase: w ? 'end' : 'day', winner: w || null });
    });
    on('o-leave', 'click', () => { haptic(); leaveRoom(code); });
    return;
  }

  if (s.phase === 'day') {
    const aliveNames = players.filter(p => alive[p.id]).map(p => p.name).join(', ');
    h(`<div class="topbar"><span class="pill">\u2600\uFE0F \u0414\u0435\u043D\u044C ${s.day} \u00B7 ${esc(code)}</span></div>
       <div class="reveal-box"><div style="font-size:44px">\uD83C\uDF05</div><p class="big">${esc(s.log || '')}</p></div>
       <div class="card"><h3>\u0416\u0438\u0432\u044B\u0435</h3><p>${esc(aliveNames)}</p></div>
       ${amHost ? '<button class="btn warn" id="mf-vote">\uD83D\uDDF3\uFE0F \u041D\u0430\u0447\u0430\u0442\u044C \u0433\u043E\u043B\u043E\u0441\u043E\u0432\u0430\u043D\u0438\u0435</button>' : '<p class="hint center">\u041E\u0431\u0441\u0443\u0436\u0434\u0430\u0439\u0442\u0435. \u0416\u0434\u0451\u043C \u0432\u0435\u0434\u0443\u0449\u0435\u0433\u043E\u2026</p>'}
       <button class="btn secondary" id="o-leave">\uD83D\uDEAA \u0412\u044B\u0439\u0442\u0438</button>`);
    if (amHost) on('mf-vote', 'click', () => { haptic(); stateRef(code).update({ phase: 'vote', votes: {} }); });
    on('o-leave', 'click', () => { haptic(); leaveRoom(code); });
    return;
  }

  if (s.phase === 'vote') {
    const votes = s.votes || {}; const myVote = votes[me];
    let body;
    if (dead) {
      body = '<div class="reveal-box"><div style="font-size:48px">\uD83D\uDC7B</div><h2>\u0412\u044B \u0432\u044B\u0431\u044B\u043B\u0438</h2><p class="hint">\u041D\u0430\u0431\u043B\u044E\u0434\u0430\u0439\u0442\u0435 \u0437\u0430 \u0433\u043E\u043B\u043E\u0441\u043E\u0432\u0430\u043D\u0438\u0435\u043C.</p></div>';
    } else {
      const targets = players.filter(p => alive[p.id] && p.id !== me);
      body = '<h2>\uD83D\uDDF3\uFE0F \u041A\u043E\u0433\u043E \u0438\u0437\u0433\u043D\u0430\u0442\u044C?</h2>' + targets.map(p => `<button class="btn ${myVote === p.id ? 'danger' : 'secondary'}" data-v="${p.id}">${esc(p.name)}${myVote === p.id ? ' \u2713' : ''}</button>`).join('') + `<button class="btn ${myVote === 'skip' ? 'warn' : 'secondary'}" data-v="skip">\u0412\u043E\u0437\u0434\u0435\u0440\u0436\u0430\u0442\u044C\u0441\u044F${myVote === 'skip' ? ' \u2713' : ''}</button>`;
    }
    const votedCount = Object.keys(votes).length;
    h(`<div class="topbar"><span class="pill">\uD83D\uDDF3\uFE0F \u0413\u043E\u043B\u043E\u0441\u043E\u0432\u0430\u043D\u0438\u0435 \u00B7 ${esc(code)}</span></div>${body}
       <p class="hint">\u041F\u0440\u043E\u0433\u043E\u043B\u043E\u0441\u043E\u0432\u0430\u043B\u043E: ${votedCount}/${aliveIds.length}</p>
       ${amHost ? '<button class="btn" id="mf-tally">\u041F\u043E\u0434\u0432\u0435\u0441\u0442\u0438 \u0438\u0442\u043E\u0433</button>' : ''}
       <button class="btn secondary" id="o-leave">\uD83D\uDEAA \u0412\u044B\u0439\u0442\u0438</button>`);
    if (!dead) document.querySelectorAll('[data-v]').forEach(b => b.addEventListener('click', () => { haptic(); DB.ref('rooms/' + code + '/state/votes/' + me).set(b.dataset.v); }));
    if (amHost) on('mf-tally', 'click', () => {
      haptic();
      const cnt = {}; Object.keys(votes).forEach(k => { const t = votes[k]; if (t && t !== 'skip') cnt[t] = (cnt[t] || 0) + 1; });
      let elim = null, max = 0, tie = false;
      Object.keys(cnt).forEach(t => { if (cnt[t] > max) { max = cnt[t]; elim = t; tie = false; } else if (cnt[t] === max) { tie = true; } });
      const nalive = Object.assign({}, alive); let log;
      if (!elim || tie) { log = '\u2696\uFE0F \u0413\u043E\u043B\u043E\u0441\u0430 \u0440\u0430\u0437\u0434\u0435\u043B\u0438\u043B\u0438\u0441\u044C \u2014 \u043D\u0438\u043A\u043E\u0433\u043E \u043D\u0435 \u0438\u0437\u0433\u043D\u0430\u043B\u0438.'; }
      else { nalive[elim] = false; const r = roles[elim]; log = '\u2696\uFE0F \u0418\u0437\u0433\u043D\u0430\u043D: ' + nameIn(players, elim) + ' \u2014 \u0440\u043E\u043B\u044C: ' + r + ' ' + ((ROLE_INFO[r] || {}).emoji || ''); }
      const w = oMafiaWin(roles, nalive);
      stateRef(code).update({ alive: nalive, log, phase: w ? 'end' : 'night', day: s.day + (w ? 0 : 1), night: {}, winner: w || null });
    });
    on('o-leave', 'click', () => { haptic(); leaveRoom(code); });
    return;
  }

  if (s.phase === 'end') {
    const winner = s.winner;
    const roleRows = players.map(p => `<div class="scorerow"><span>${esc(p.name)} ${alive[p.id] ? '' : '\uD83D\uDC80'}</span><b>${esc(roles[p.id] || '')} ${((ROLE_INFO[roles[p.id]] || {}).emoji || '')}</b></div>`).join('');
    h(`<div class="topbar"><span class="pill">\uD83D\uDD2A \u0418\u0442\u043E\u0433 \u00B7 ${esc(code)}</span></div>
       <div class="reveal-box"><div style="font-size:52px">${winner === 'mafia' ? '\uD83D\uDD2A' : '\uD83C\uDFC6'}</div><h2>${winner === 'mafia' ? '\u041F\u043E\u0431\u0435\u0434\u0438\u043B\u0430 \u041C\u0430\u0444\u0438\u044F!' : '\u041F\u043E\u0431\u0435\u0434\u0438\u043B \u0413\u043E\u0440\u043E\u0434!'}</h2></div>
       <div class="card"><h3>\u0412\u0441\u0435 \u0440\u043E\u043B\u0438</h3>${roleRows}</div>
       ${amHost ? '<button class="btn" id="mf-again">\uD83D\uDD01 \u041D\u043E\u0432\u0430\u044F \u0438\u0433\u0440\u0430</button>' : '<p class="hint center">\u0416\u0434\u0451\u043C \u0432\u0435\u0434\u0443\u0449\u0435\u0433\u043E\u2026</p>'}
       <button class="btn secondary" id="o-leave">\uD83D\uDEAA \u0412\u044B\u0439\u0442\u0438</button>`);
    if (amHost) on('mf-again', 'click', () => { haptic(); roomRef(code).update({ 'meta/status': 'lobby', state: null }); });
    on('o-leave', 'click', () => { haptic(); leaveRoom(code); });
    return;
  }
}

// ====================== HOME + MODE CHOOSER (override) ======================
function home() {
  detachRoom();
  setBack(null);
  h(`
    <div class="center">
      <h1>\uD83C\uDFAE GameDAG</h1>
      <p class="hint">\u0418\u0433\u0440\u044B \u0434\u043B\u044F \u043A\u043E\u043C\u043F\u0430\u043D\u0438\u0438 \u2014 \u0441 \u043E\u0434\u043D\u043E\u0433\u043E \u0442\u0435\u043B\u0435\u0444\u043E\u043D\u0430 \u0438\u043B\u0438 \u043E\u043D\u043B\u0430\u0439\u043D</p>
    </div>
    <div class="spacer"></div>
    <button class="menu-item" id="m-spy"><span class="emoji">\uD83D\uDD75\uFE0F</span><span><div class="ttl">\u0428\u043F\u0438\u043E\u043D</div><div class="sub">\u041D\u0430\u0439\u0434\u0438 \u0442\u043E\u0433\u043E, \u043A\u0442\u043E \u043D\u0435 \u0437\u043D\u0430\u0435\u0442 \u0441\u043B\u043E\u0432\u043E</div></span></button>
    <button class="menu-item" id="m-mafia"><span class="emoji">\uD83D\uDD2A</span><span><div class="ttl">\u041C\u0430\u0444\u0438\u044F</div><div class="sub">\u0413\u043E\u0440\u043E\u0434 \u043F\u0440\u043E\u0442\u0438\u0432 \u043C\u0430\u0444\u0438\u0438</div></span></button>
    <button class="menu-item" id="m-croc"><span class="emoji">\uD83D\uDC0A</span><span><div class="ttl">\u041A\u0440\u043E\u043A\u043E\u0434\u0438\u043B</div><div class="sub">\u041E\u0431\u044A\u044F\u0441\u043D\u0438 \u0441\u043B\u043E\u0432\u043E \u0431\u0435\u0437 \u0441\u043B\u043E\u0432</div></span></button>
    <button class="menu-item" id="m-tod"><span class="emoji">\uD83C\uDFAD</span><span><div class="ttl">\u041F\u0440\u0430\u0432\u0434\u0430 \u0438\u043B\u0438 \u0414\u0435\u0439\u0441\u0442\u0432\u0438\u0435</div><div class="sub">\u0427\u0435\u0441\u0442\u043D\u043E\u0441\u0442\u044C \u0438\u043B\u0438 \u0441\u043C\u0435\u043B\u043E\u0441\u0442\u044C</div></span></button>
  `);
  on('m-spy', 'click', () => { haptic(); chooseMode('spy'); });
  on('m-mafia', 'click', () => { haptic(); chooseMode('mafia'); });
  on('m-croc', 'click', () => { haptic(); chooseMode('croc'); });
  on('m-tod', 'click', () => { haptic(); chooseMode('tod'); });
}
function chooseMode(game) {
  detachRoom();
  setBack(home);
  h(`<div class="topbar"><span class="pill">${gameTitle(game)}</span></div>
     <h2>\u0420\u0435\u0436\u0438\u043C \u0438\u0433\u0440\u044B</h2>
     <button class="menu-item" id="md-single"><span class="emoji">\uD83D\uDCF1</span><span><div class="ttl">\u0421 \u043E\u0434\u043D\u043E\u0433\u043E \u0443\u0441\u0442\u0440\u043E\u0439\u0441\u0442\u0432\u0430</div><div class="sub">\u041F\u0435\u0440\u0435\u0434\u0430\u0432\u0430\u0439\u0442\u0435 \u0442\u0435\u043B\u0435\u0444\u043E\u043D \u043F\u043E \u043E\u0447\u0435\u0440\u0435\u0434\u0438</div></span></button>
     <button class="menu-item" id="md-online"><span class="emoji">\uD83C\uDF10</span><span><div class="ttl">\u041E\u043D\u043B\u0430\u0439\u043D \u0441 \u0434\u0440\u0443\u0437\u044C\u044F\u043C\u0438</div><div class="sub">\u041A\u0430\u0436\u0434\u044B\u0439 \u0441\u043E \u0441\u0432\u043E\u0435\u0433\u043E \u0442\u0435\u043B\u0435\u0444\u043E\u043D\u0430</div></span></button>
     <div class="spacer"></div>
     <button class="btn secondary" id="md-back">\u2190 \u041D\u0430\u0437\u0430\u0434</button>`);
  on('md-single', 'click', () => { haptic(); singleStart(game); });
  on('md-online', 'click', () => { haptic(); onlineEntry(game); });
  on('md-back', 'click', () => { haptic(); home(); });
}
function singleStart(game) {
  if (game === 'spy') return spySetup();
  if (game === 'mafia') return mafiaSetup();
  if (game === 'croc') return crocSetup();
  if (game === 'tod') return todSetup();
}

fbInit();
home();

</script>
</body>
</html>
