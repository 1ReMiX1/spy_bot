<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Название твоей игры</title>
<style>
  /*
    Это шаблон для новой игры сообщества.
    Скопируй эту папку, переименуй её и напиши свою игру здесь.
    Вся игра должна помещаться в одном файле index.html (HTML + CSS + JS).
    Игра запускается в изолированном <iframe sandbox="allow-scripts">,
    поэтому у неё НЕТ доступа к боту, к Telegram и к другим играм.
  */
  :root { color-scheme: dark; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0e0f13; color: #f2f2f7;
    display: flex; align-items: center; justify-content: center;
    text-align: center; padding: 20px;
  }
</style>
</head>
<body>
  <div>
    <h1>Привет! 👋</h1>
    <p>Замени этот код своей игрой.</p>
  </div>

<script>
  // Твой код игры здесь.
  console.log('Игра запущена');
</script>
</body>
</html>
